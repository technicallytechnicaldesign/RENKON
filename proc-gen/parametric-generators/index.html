    const scaleRow = row("scale", "Scale", 8, 160, 2);

    // Custom control rows (declared per pattern in PATTERN_META[kind].custom):

    // scaleRow/octaveRow/countRow) -- and reading/writing
    // state.custom[kind][key], so values persist across pattern switches
    // exactly like the shared sliders do.
    const customRangeRefs = {};
    const customSelectRefs = {};
    function customRangeRow(kind, def) {
      const rowEl = document.createElement("div");
      rowEl.className = "param-row";

      lab.textContent = def.label;

      input.type = "range";

      valSpan.className = "param-value";
      valSpan.textContent = state.custom[kind][def.key];

        state.custom[kind][def.key] = parseFloat(input.value);
        valSpan.textContent = state.custom[kind][def.key];
        regenerate();
      });
      rowEl.appendChild(lab); rowEl.appendChild(input); rowEl.appendChild(valSpan);
      (customRangeRefs[kind] = customRangeRefs[kind] || {})[def.key] = { input, valSpan };

    }
    function customSelectRow(kind, def) {
      const rowEl = document.createElement("div");
      rowEl.className = "param-row";
      const lab = document.createElement("label");
      lab.textContent = def.label;

      const group = document.createElement("div");

        group.appendChild(btn);

    // display:contents so the rows inside participate directly in the
    // .texture-sliders flex flow, identical to the shared slider rows.
    const customWraps = {};

    // --- 4. SURFACE & TONE (<details open> — expanded by default, nothing

    sliderRowsWrap = section("Surface & Tone", { details: true });
    row("roughness", "Roughness", 0.1, 0.9, 0.05);
    row("contrast", "Contrast", 0.5, 3, 0.05);

    levelsLabel.textContent = "Levels";
    sliderRowsWrap.appendChild(levelsLabel);
    row("levelsBlack", "Black Point", 0, 0.9, 0.01);
    row("levelsWhite", "White Point", 0.1, 1, 0.01);
    row("levelsGamma", "Gamma", 0.2, 3, 0.05);

    const invertRow = document.createElement("div");
    invertRow.className = "param-row";
    const invertLabel = document.createElement("label");
    invertLabel.textContent = "Invert";
    const invertInput = document.createElement("input");
    invertInput.type = "checkbox";
    invertInput.checked = state.invert;
    invertInput.addEventListener("change", () => {
      state.invert = invertInput.checked;

    invertRow.appendChild(invertInput);

    // --- 5. PREVIEW & ANIMATION ---------------------------------------------
    // Bump Strength / Light Angle drive the Bump Preview + Normal export
    // lighting (not the height data itself), so they're grouped here with
    // Animate / Tile Preview — the animate row (built further down, once the
    // preview canvases exist) is appended into this same section body.
    const previewAnimBody = section("Preview & Animation", { details: true });
    sliderRowsWrap = previewAnimBody;
    row("bumpStrength", "Bump Strength", 0.1, 3, 0.05);
    row("lightAngle", "Light Angle", 0, 360, 5);

    const allPatternBtns = [];
    const patternBtnByKind = {};
    // Shared resync used both by the pattern-button click handler and by
    // preset loading (backlog #3) — whichever changes state.pattern must run
    // the same active-button / row-visibility / custom-wrap sync so the UI
    // never silently drifts from state.
    function syncPatternUI(kind) {
      const meta = PATTERN_META[kind];
      allPatternBtns.forEach(b => b.classList.remove("primary"));
      if (patternBtnByKind[kind]) patternBtnByKind[kind].classList.add("primary");
      scaleRow.style.display = meta.params.scale ? "flex" : "none";
      octaveRow.style.display = meta.params.octaves ? "flex" : "none";
      countRow.style.display = meta.params.count ? "flex" : "none";
      Object.keys(customWraps).forEach(k => {
        customWraps[k].style.display = k === kind ? "contents" : "none";
      });
    }
    PATTERN_GROUPS.forEach(group => {
      const groupWrap = document.createElement("div");
      groupWrap.className = "pattern-group";
      const groupLabel = document.createElement("div");
      groupLabel.className = "pattern-group-label";
      groupLabel.textContent = group.label;
      groupWrap.appendChild(groupLabel);
      const groupBtns = document.createElement("div");
      groupBtns.className = "pattern-select";
      group.kinds.forEach(kind => {
        const meta = PATTERN_META[kind];
        const btn = document.createElement("button");
        btn.className = "btn" + (state.pattern === kind ? " primary" : "");
        btn.textContent = meta.name;
        btn.addEventListener("click", () => {
          state.pattern = kind;
          syncPatternUI(kind);
          regenerate();
        });
        allPatternBtns.push(btn);
        patternBtnByKind[kind] = btn;
        groupBtns.appendChild(btn);
      });
      groupWrap.appendChild(groupBtns);
      patternGroup.appendChild(groupWrap);
    });

    // --- Preset library wiring (backlog #3) --------------------------------
    // Storage: window.storage (used by the Overlay Customizer's palette
    // save/load, see buildPalettePanel above) is an environment-injected API
    // that is never defined anywhere in this file — it's only present in
    // whatever sandboxed host provides it, and silently falls through to
    // "Storage unavailable" otherwise. This app is also opened as a plain
    // local file and served static on GitHub Pages (see root CLAUDE.md), both
    // plain-browser contexts with no such global. Presets use `localStorage`
    // directly instead, under the same key-naming scheme the spec specifies
    // (`texturepreset:<name>`, `texturepreset:index`) so the feature actually
    // persists in every context this app runs in.
    function presetStorageGet(key) {
      try { return localStorage.getItem(key); } catch (e) { return null; }
    }
    function presetStorageSet(key, value) {
      try { localStorage.setItem(key, value); return true; } catch (e) { return false; }
    }
    function loadPresetIndex() {
      try {
        const arr = JSON.parse(presetStorageGet("texturepreset:index") || "[]");
        return Array.isArray(arr) ? arr : [];
      } catch (e) { return []; }
    }
    function savePresetIndex(names) {
      presetStorageSet("texturepreset:index", JSON.stringify(names));
    }
    function getPresetByName(name) {
      if (BUILTIN_PRESETS[name]) return BUILTIN_PRESETS[name];
      try {
        const raw = presetStorageGet("texturepreset:" + name);
        return raw ? JSON.parse(raw) : null;
      } catch (e) { return null; }
    }
    // Saves the *look*, not the session: everything in `state` except `seed`
    // (explicit in the spec — a preset should look like itself on any seed)
    // and also except `time`/`animate` (a judgment call beyond the spec: those
    // are transient playback state, not parameters of the look, and blindly
    // restoring `animate` would desync the Play/Pause button and rAF loop
    // from state.animate since those are only ever meant to change together
    // via setAnimate()). Name collisions with a built-in are rejected outright
    // rather than silently overwritten or renamed, so the shipped reference
    // presets always stay exactly what's documented in CHANGELOG.md.
    function savePresetAs(name) {
      name = (name || "").trim();
      if (!name) return { ok: false, reason: "empty" };
      if (BUILTIN_PRESETS[name]) return { ok: false, reason: "builtin-collision" };
      const toSave = {
        pattern: state.pattern, scale: state.scale, octaves: state.octaves, count: state.count,
        roughness: state.roughness, contrast: state.contrast, levelsBlack: state.levelsBlack,
        levelsWhite: state.levelsWhite, levelsGamma: state.levelsGamma,
        bumpStrength: state.bumpStrength, lightAngle: state.lightAngle, invert: state.invert,
        custom: JSON.parse(JSON.stringify(state.custom))
      };
      presetStorageSet("texturepreset:" + name, JSON.stringify(toSave));
      const idx = loadPresetIndex();
      if (!idx.includes(name)) { idx.push(name); savePresetIndex(idx); }
      refreshPresetDropdown();
      return { ok: true };
    }
    function syncSharedSlidersUI() {
      Object.keys(sliderRefs).forEach(key => {
        const { input, valSpan } = sliderRefs[key];
        input.value = state[key];
        valSpan.textContent = state[key];
      });
    }
    function syncCustomControlsUI() {
      Object.keys(customRangeRefs).forEach(kind => {
        Object.keys(customRangeRefs[kind]).forEach(key => {
          const { input, valSpan } = customRangeRefs[kind][key];
          const v = state.custom[kind][key];
          input.value = v;
          valSpan.textContent = v;
        });
      });
      Object.keys(customSelectRefs).forEach(kind => {
        Object.keys(customSelectRefs[kind]).forEach(key => {
          const { btns, def } = customSelectRefs[kind][key];
          const v = state.custom[kind][key];
          btns.forEach(b => b.classList.remove("primary"));
          const idx = def.options.findIndex(o => o.value === v);
          if (idx >= 0) btns[idx].classList.add("primary");
        });
      });
    }
    // Applies every field of a saved/built-in preset object to `state`
    // (leaving state.seed untouched) and resyncs every control that could be
    // showing a now-stale value: shared sliders, custom-param rows for every
    // pattern kind, the Invert checkbox, and the pattern-button/row-visibility
    // resync shared with the pattern-button click handler.
    function applyPresetState(preset) {
      state.pattern = preset.pattern;
      state.scale = preset.scale;
      state.octaves = preset.octaves;
      state.count = preset.count;
      state.roughness = preset.roughness;
      state.contrast = preset.contrast;
      state.levelsBlack = preset.levelsBlack;
      state.levelsWhite = preset.levelsWhite;
      state.levelsGamma = preset.levelsGamma;
      state.bumpStrength = preset.bumpStrength;
      state.lightAngle = preset.lightAngle;
      state.invert = preset.invert;
      state.custom = JSON.parse(JSON.stringify(preset.custom || {}));
      // Defensive: fill in any pattern kind the saved preset predates (e.g. a
      // preset saved before a new Pro Finish pattern shipped custom params).
      Object.keys(PATTERN_META).forEach(kind => {
        if (!state.custom[kind]) {
          state.custom[kind] = {};
          (PATTERN_META[kind].custom || []).forEach(def => { state.custom[kind][def.key] = def.default; });
        }
      });
      invertInput.checked = state.invert;
      syncSharedSlidersUI();
      syncCustomControlsUI();
      syncPatternUI(state.pattern);
      regenerate();
    }
    function refreshPresetDropdown() {
      const savedNames = loadPresetIndex().filter(n => !BUILTIN_PRESETS[n]);
      const allNames = Object.keys(BUILTIN_PRESETS).concat(savedNames);
      const prevValue = presetSelect.value;
      presetSelect.innerHTML = "";
      const placeholder = document.createElement("option");
      placeholder.value = "";
      placeholder.textContent = "Load preset…";
      presetSelect.appendChild(placeholder);
      allNames.forEach(name => {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name + (BUILTIN_PRESETS[name] ? " ★" : "");
        presetSelect.appendChild(opt);
      });
      presetSelect.value = allNames.includes(prevValue) ? prevValue : "";
    }
    presetSelect.addEventListener("change", () => {
      const name = presetSelect.value;
      presetSelect.value = "";
      if (!name) return;
      const preset = getPresetByName(name);
      if (preset) applyPresetState(preset);
    });
    savePresetBtn.addEventListener("click", () => {
      const name = window.prompt("Save current settings as preset:", "");
      if (name == null) return;
      const result = savePresetAs(name);
      if (result.ok) {
        presetStatus.textContent = "Saved “" + name.trim() + "”";
      } else if (result.reason === "builtin-collision") {
        presetStatus.textContent = "Name reserved by a built-in — pick another";
      } else {
        presetStatus.textContent = "";
      }
      setTimeout(() => presetStatus.textContent = "", 3000);
    });
    refreshPresetDropdown();

    seedValue.textContent = String(state.seed);

    const canvasRow = document.createElement("div");
    canvasRow.className = "canvas-row";
    main.appendChild(canvasRow);

    function canvasPanel(title, caption) {
      const panel = document.createElement("div");

        panel.appendChild(cap);

      canvasRow.appendChild(panel);
      return canvas;
    }

    const textureCanvas = canvasPanel("Texture / Height Map", "This is the exportable data.");
    const bumpCanvas = canvasPanel("Bump Preview (simulated light)", "Lighting preview only — not exported as a texture. Adjust Bump Strength / Light Angle above.");

    // --- 7. EXPORT: Group A "Static maps" (always visible) + Group B
    // "Animated" (<details open> — expanded by default, nothing hidden).
    const exportSection = document.createElement("div");

    actions.className = "cell-actions";
    exportSection.appendChild(actions);

    animDetails.open = true;
    const animSummary = document.createElement("summary");
    animSummary.className = "section-label";
    animSummary.innerHTML = '<span class="chev" aria-hidden="true">&rsaquo;</span> Animated';
    animDetails.appendChild(animSummary);
    const animActions = document.createElement("div");
    animActions.className = "cell-actions";
    animDetails.appendChild(animActions);

    main.appendChild(animDetails);

    const statusLine = document.createElement("div");
    statusLine.className = "status-line";
    main.appendChild(statusLine);

    const exportTextureBtn = document.createElement("button");
    exportTextureBtn.className = "btn primary";
    exportTextureBtn.textContent = "Export Height/Bump Map PNG";
    exportTextureBtn.title = "The grayscale height data — drop into a bump/height slot";
    exportTextureBtn.addEventListener("click", () => {
      statusLine.textContent = "Rendering at " + TEXTURE_EXPORT_SIZE + "px\u2026";
      setTimeout(() => {
        const data = computeTextureData(TEXTURE_EXPORT_SIZE, state);

        setTimeout(() => statusLine.textContent = "", 3500);
      }, 10);
    });

    const exportPreviewBtn = document.createElement("button");
    exportPreviewBtn.className = "btn";
    exportPreviewBtn.textContent = "Export Preview Render PNG";
    exportPreviewBtn.title = "The shaded relief preview as a PNG — visual only, not a texture map";
    exportPreviewBtn.addEventListener("click", () => {
      statusLine.textContent = "Rendering at " + TEXTURE_EXPORT_SIZE + "px\u2026";
      setTimeout(() => {
        const data = computeTextureData(TEXTURE_EXPORT_SIZE, state);
        const exportCanvas = document.createElement("canvas");
        paintBumpPreview(exportCanvas, data, TEXTURE_EXPORT_SIZE, TEXTURE_EXPORT_SIZE, state.bumpStrength, state.lightAngle);
        openPngInNewTab(exportCanvas, "bump_preview_" + state.pattern + "_" + state.seed + ".png");
        statusLine.textContent = "Preview render opened in a new tab (not a texture map — visual only)";
        setTimeout(() => statusLine.textContent = "", 3500);
      }, 10);
    });

    const exportNormalBtn = document.createElement("button");
    exportNormalBtn.className = "btn";
    exportNormalBtn.textContent = "Export Normal Map PNG";
    exportNormalBtn.title = "Tangent-space RGB normal map via Sobel — usually preferred over height for surface detail";
    exportNormalBtn.addEventListener("click", () => {
      statusLine.textContent = "Rendering at " + TEXTURE_EXPORT_SIZE + "px…";
      setTimeout(() => {
        const data = computeTextureData(TEXTURE_EXPORT_SIZE, state);
        const exportCanvas = document.createElement("canvas");
        paintNormalMap(exportCanvas, data, TEXTURE_EXPORT_SIZE, TEXTURE_EXPORT_SIZE, state.bumpStrength);
        openPngInNewTab(exportCanvas, "normal_" + state.pattern + "_" + state.seed + ".png");
        statusLine.textContent = "Normal map opened in a new tab — save it from there";
        setTimeout(() => statusLine.textContent = "", 3500);
      }, 10);
    });

    const frameCountSelect = document.createElement("select");
    frameCountSelect.className = "btn";
    [12, 24, 48].forEach(n => {
      const opt = document.createElement("option");
      opt.value = String(n);
      opt.textContent = n + " frames";
      if (n === 24) opt.selected = true;
      frameCountSelect.appendChild(opt);
    });

    const exportFramesBtn = document.createElement("button");
    exportFramesBtn.className = "btn";
    exportFramesBtn.textContent = "Export Frame Sequence (PNG)";
    exportFramesBtn.title = "Renders one full animation loop as a numbered PNG sequence in a new tab";
    exportFramesBtn.addEventListener("click", () => {
      exportFrameSequence(parseInt(frameCountSelect.value, 10));
    });

    async function exportFrameSequence(frameCount) {
      const wasAnimating = animate;
      if (wasAnimating) setAnimate(false);
      const savedTime = state.time;
      const savedAnimate = state.animate;
      state.animate = true;
      exportFramesBtn.disabled = true;
      frameCountSelect.disabled = true;
      const seedTag = state.pattern + "_" + state.seed;
      const frames = [];
      try {
        const exportCanvas = document.createElement("canvas");
        for (let k = 0; k < frameCount; k++) {
          state.time = k / frameCount;
          const data = computeTextureData(TEXTURE_EXPORT_SIZE, state);
          paintHeightMap(exportCanvas, data, TEXTURE_EXPORT_SIZE, TEXTURE_EXPORT_SIZE);
          const blob = await new Promise(res => exportCanvas.toBlob(res, "image/png"));
          if (!blob) throw new Error("toBlob failed");
          const url = URL.createObjectURL(blob);
          const filename = seedTag + "_" + String(k + 1).padStart(4, "0") + ".png";
          frames.push({ url, filename });
          statusLine.textContent = "Rendering frame " + (k + 1) + "/" + frameCount + "…";
          await new Promise(r => setTimeout(r, 0));
        }
        openFrameGalleryInNewTab(frames, seedTag);
        statusLine.textContent = "Frame sequence (" + frameCount + ") opened in a new tab — save from there";
      } catch (e) {
        statusLine.textContent = "Frame sequence export failed";
        frames.forEach(f => URL.revokeObjectURL(f.url));
      } finally {
        state.time = savedTime;
        state.animate = savedAnimate;
        regenerate();
        exportFramesBtn.disabled = false;
        frameCountSelect.disabled = false;
        setTimeout(() => statusLine.textContent = "", 3500);
      }
    }

    actions.appendChild(exportTextureBtn);
    actions.appendChild(exportPreviewBtn);
    actions.appendChild(exportNormalBtn);
    animActions.appendChild(frameCountSelect);
    animActions.appendChild(exportFramesBtn);

    const foot = document.createElement("footer");
    foot.className = "note";
    foot.innerHTML = `The Height/Bump Map export is the actual grayscale data — usable directly in a bump/height texture slot. The Preview Render is a simulated relief shading of that same data so you can judge depth and light direction before exporting; it is not itself a texture map. The Normal Map export is a tangent-space RGB normal map derived from the same height data via a Sobel filter (strength from Bump Strength) — the channel a render engine typically wants over a height map for surface detail. Export Frame Sequence renders the animated height map across one full loop as a numbered PNG sequence (opens in a new tab) — the deliverable a render engine wants for an animated bump channel.`;
    main.appendChild(foot);

    // --- Tile Preview (display-only QA view, feature backlog #1): when on,
    // both preview panels show the already-computed map repeated 3x3 at 1/3
    // scale so spatial seams become visible on every pattern — including the
    // ones documented as non-tiling. It lives outside `state` and never
    // touches computeTextureData or any export path: exports always produce
    // the single un-tiled map. ---
    let tilePreview = false;
    const tileScratchTex = document.createElement("canvas");
    const tileScratchBump = document.createElement("canvas");
    function drawTiled3x3(dst, src, size) {
      dst.width = size; dst.height = size;
      const ctx = dst.getContext("2d");
      const third = size / 3;
      for (let ty = 0; ty < 3; ty++) {
        for (let tx = 0; tx < 3; tx++) ctx.drawImage(src, tx * third, ty * third, third, third);
      }
    }

    function regenerate() {
      const data = computeTextureData(TEXTURE_PREVIEW_SIZE, state);
      // With Tile Preview on, paint into offscreen scratch canvases and
      // drawImage them 3x3 into the visible panels — the map is never
      // regenerated at a different size. Runs per rAF frame while animating,
      // so each fresh animated frame is tiled too.
      const texTarget = tilePreview ? tileScratchTex : textureCanvas;
      const bumpTarget = tilePreview ? tileScratchBump : bumpCanvas;
      paintHeightMap(texTarget, data, TEXTURE_PREVIEW_SIZE, TEXTURE_PREVIEW_SIZE);
      paintBumpPreview(bumpTarget, data, TEXTURE_PREVIEW_SIZE, TEXTURE_PREVIEW_SIZE, state.bumpStrength, state.lightAngle);
      if (tilePreview) {
        drawTiled3x3(textureCanvas, tileScratchTex, TEXTURE_PREVIEW_SIZE);
        drawTiled3x3(bumpCanvas, tileScratchBump, TEXTURE_PREVIEW_SIZE);
      }
    }

    // --- Animation: live rAF preview (§6.2). Static export is unchanged; this
    // only drives the on-screen preview. state.time cycles 0..1 per loop. ---
    let animate = false, rafId = null, loopMs = 3000;
    const animRow = document.createElement("div");
    animRow.className = "param-row";
    animRow.style.display = "flex";
    animRow.style.alignItems = "center";
    animRow.style.gap = "12px";
    animRow.style.flexWrap = "wrap";
    const animLabel = document.createElement("label");
    animLabel.textContent = "Animate";
    const playBtn = document.createElement("button");
    playBtn.className = "btn";
    playBtn.type = "button";
    playBtn.textContent = "▶ Play";
    const loopInput = document.createElement("input");
    loopInput.type = "range";
    loopInput.min = 0.5; loopInput.max = 8; loopInput.step = 0.5; loopInput.value = 3;
    loopInput.style.flex = "1";
    loopInput.setAttribute("aria-label", "Loop duration (seconds)");
    const loopVal = document.createElement("span");
    loopVal.className = "param-value";
    loopVal.textContent = "3.0s loop";
    loopInput.addEventListener("input", () => {
      loopMs = parseFloat(loopInput.value) * 1000;
      loopVal.textContent = parseFloat(loopInput.value).toFixed(1) + "s loop";
    });
    function frame() {
      // Self-cleanup: stop the loop once the tool is navigated away from.
      if (!document.body.contains(textureCanvas)) { rafId = null; return; }
      state.time = (performance.now() / loopMs) % 1;
      regenerate();
      rafId = requestAnimationFrame(frame);
    }
    function setAnimate(on) {
      animate = on;
      state.animate = on;
      playBtn.textContent = on ? "⏸ Pause" : "▶ Play";
      playBtn.classList.toggle("primary", on);
      if (on) {
        if (rafId == null) rafId = requestAnimationFrame(frame);
      } else {
        if (rafId != null) cancelAnimationFrame(rafId);
        rafId = null;
        state.time = 0;
        regenerate();
      }
    }
    playBtn.addEventListener("click", () => setAnimate(!animate));
    const tileBtn = document.createElement("button");
    tileBtn.className = "btn";
    tileBtn.type = "button";
    tileBtn.textContent = "Tile Preview (QA)";
    tileBtn.title = "QA view: repeat the current map 3×3 at 1/3 scale to reveal spatial seams. Display-only — exports are unaffected.";
    tileBtn.addEventListener("click", () => {
      tilePreview = !tilePreview;
      tileBtn.classList.toggle("primary", tilePreview);
      regenerate();
    });
    animRow.appendChild(animLabel);
    animRow.appendChild(playBtn);
    animRow.appendChild(tileBtn);
    animRow.appendChild(loopInput);
    animRow.appendChild(loopVal);
    previewAnimBody.appendChild(animRow);

    regenerate();
  }

  /* =========================================================
     FREEZE HELPERS
     ========================================================= */
  function bakeCssFreeze(svgEl) {
    const clone = svgEl.cloneNode(true);
    const liveAll = svgEl.querySelectorAll("*");
    const cloneAll = clone.querySelectorAll("*");
    liveAll.forEach((liveEl, i) => {
      const cs = getComputedStyle(liveEl);
      if (cs.animationName && cs.animationName !== "none") {
        const t = cloneAll[i];
        t.style.animation = "none";
        t.style.opacity = cs.opacity;
        t.style.transform = cs.transform;
        if (cs.strokeDashoffset && cs.strokeDashoffset !== "none") t.style.strokeDashoffset = cs.strokeDashoffset;
      }
    });
    return clone;
  }

  function matrixToString(m) { return `matrix(${m.a},${m.b},${m.c},${m.d},${m.e},${m.f})`; }

  function bakeSmilFreeze(svgEl) {
    const clone = svgEl.cloneNode(true);
    try {
      // Bake any <pattern> driven by an animateTransform (patternTransform), e.g. flow-straight.
      const livePatterns = svgEl.querySelectorAll("pattern");
      const clonePatterns = clone.querySelectorAll("pattern");
      livePatterns.forEach((liveP, i) => {
        const cloneP = clonePatterns[i];
        const mat = liveP.patternTransform.baseVal.numberOfItems
          ? liveP.patternTransform.baseVal.consolidate().matrix : null;
        if (mat) cloneP.setAttribute("patternTransform", matrixToString(mat));
        const animEl = cloneP.querySelector("animateTransform");
        if (animEl) animEl.remove();
      });
      // Bake any number of animateMotion-driven elements, e.g. flow-pulse-wave's
      // single glow or flow-droplet-stream's three particles.
      //
      // animateMotion's supplemental transform is never reflected in
      // transform.baseVal (that's the static, non-animated attribute) or even
      // transform.animVal (verified empirically — both stay null throughout).
      // getCTM() is the only reliable read of the live motion transform, so
      // derive the matrix from the target's CTM relative to the SVG root
      // (their common ancestor's own CTM cancels out via the inverse-multiply,
      // so this is robust regardless of viewBox/width/height scaling).
      const liveMotion = svgEl.querySelectorAll('[data-role="motion-target"]');
      const cloneMotion = clone.querySelectorAll('[data-role="motion-target"]');
      const rootCtm = svgEl.getCTM();
      liveMotion.forEach((liveEl, i) => {
        const cloneEl = cloneMotion[i];
        const elCtm = liveEl.getCTM();
        const mat = (rootCtm && elCtm) ? rootCtm.inverse().multiply(elCtm) : null;
        if (mat) cloneEl.setAttribute("transform", matrixToString(mat));
        const animEl = cloneEl.querySelector("animateMotion");
        if (animEl) animEl.remove();
      });
    } catch (e) { /* clone stays as an unfrozen fallback */ }
    return clone;
  }

  function freezeNode(asset, svgEl) {
    if (asset.engine === "smil") return bakeSmilFreeze(svgEl);
    if (asset.engine === "css") return bakeCssFreeze(svgEl);
    return svgEl.cloneNode(true);
  }

  function resolvedSvgMarkup(node) {
    const serialized = new XMLSerializer().serializeToString(node);
    let out = serialized;
    PALETTE_ROLES.forEach(role => {
      const val = getComputedStyle(document.documentElement).getPropertyValue(role.cssVar).trim();
      out = out.split(`var(${role.cssVar})`).join(val);
    });
    const panelVal = getComputedStyle(document.documentElement).getPropertyValue("--c-panel").trim();
    out = out.split("var(--c-panel)").join(panelVal);
    return out;
  }

  function svgToImage(markup) {
    return new Promise((resolve, reject) => {
      const svgBlob = new Blob([markup], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(svgBlob);
      const img = new Image();
      img.onload = () => { resolve(img); URL.revokeObjectURL(url); };
      img.onerror = (e) => { URL.revokeObjectURL(url); reject(e); };
      img.src = url;
    });
  }

  function viewBoxSize(svgEl) {
    const vb = svgEl.viewBox.baseVal;
    if (vb && vb.width) return { w: vb.width, h: vb.height };
    const rect = svgEl.getBoundingClientRect();
    return { w: rect.width || 300, h: rect.height || 150 };
  }

  function downloadDataUrl(url, filename) {
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
  }

  // Open a canvas as a PNG in a new tab, sidestepping download restrictions.
  // Uses a blob: URL (NOT a data: URL — browsers block top-frame navigation to
  // data: URLs) and writes a tiny host page with the image + a working save
  // link. Works on Pages, locally, and even inside sandboxes (with popups
  // allowed); falls back to a direct download if the popup is blocked.
  function openPngInNewTab(canvas, filename) {
    return new Promise((resolve) => {
      canvas.toBlob((blob) => {
        if (!blob) { resolve(false); return; }
        const url = URL.createObjectURL(blob);
        const w = window.open("", "_blank");
        if (!w) { // popup blocked — fall back to a direct download
          downloadDataUrl(url, filename);
          setTimeout(() => URL.revokeObjectURL(url), 60000);
          resolve(true); return;
        }
        w.document.title = filename;
        w.document.body.style.cssText =
          "margin:0;min-height:100vh;background:#0a0f16;color:#e8e8e0;display:flex;" +
          "flex-direction:column;align-items:center;gap:16px;padding:24px;" +
          "font-family:'IBM Plex Mono','Courier New',monospace";
        w.document.body.innerHTML =
          '<div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#7a7f83">' + filename + '</div>' +
          '<a href="' + url + '" download="' + filename + '" style="color:#E8792E;font-size:12px;text-decoration:none;border:1px solid #E8792E;padding:8px 16px">↓ Save PNG</a>' +
          '<div style="font-size:10px;color:#7a7f83">… or right-click the image below and “Save image as…”</div>' +
          '<img src="' + url + '" alt="' + filename + '" style="max-width:94vw;max-height:78vh;border:1px solid #1c2733"/>';
        setTimeout(() => URL.revokeObjectURL(url), 5 * 60 * 1000);
        resolve(true);
      }, "image/png");
    });
  }

  // BLOB-URL-GALL: open a numbered gallery of already-rendered blob: URL PNG
  // frames in a new tab — one Save link per frame plus a Download All that
  // sequentially triggers each frame's own download link (no zip dependency,
  // in keeping with the Worker-free, dependency-minimal export path).
  function openFrameGalleryInNewTab(frames, title) {
    const w = window.open("", "_blank");
    if (!w) { // popup blocked — fall back to sequential direct downloads
      frames.forEach((f, i) => setTimeout(() => downloadDataUrl(f.url, f.filename), i * 150));
      setTimeout(() => frames.forEach(f => URL.revokeObjectURL(f.url)), 60000);
      return false;
    }
    w.document.title = title + " — frame sequence";
    w.document.body.style.cssText =
      "margin:0;min-height:100vh;background:#0a0f16;color:#e8e8e0;" +
      "font-family:'IBM Plex Mono','Courier New',monospace;padding:24px";

    const header = w.document.createElement("div");
    header.style.cssText = "display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap";
    const label = w.document.createElement("div");
    label.style.cssText = "font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#7a7f83";
    label.textContent = title + " — " + frames.length + " frames";
    const dlAllBtn = w.document.createElement("button");
    dlAllBtn.textContent = "↓ Download All";
    dlAllBtn.style.cssText =
      "color:#E8792E;font-size:12px;background:none;border:1px solid #E8792E;" +
      "padding:8px 16px;cursor:pointer;font-family:inherit;letter-spacing:.04em";
    dlAllBtn.addEventListener("click", () => {
      dlAllBtn.disabled = true;
      frames.forEach((f, i) => {
        setTimeout(() => {
          const a = w.document.createElement("a");
          a.href = f.url; a.download = f.filename;
          w.document.body.appendChild(a); a.click(); a.remove();
          if (i === frames.length - 1) dlAllBtn.disabled = false;
        }, i * 150);
      });
    });
    header.appendChild(label);
    header.appendChild(dlAllBtn);
    w.document.body.appendChild(header);

    const grid = w.document.createElement("div");
    grid.style.cssText = "display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px";
    frames.forEach(f => {
      const cell = w.document.createElement("div");
      cell.style.cssText =
        "border:1px solid #1c2733;padding:8px;display:flex;flex-direction:column;" +
        "gap:6px;align-items:center;background:#0d1520";
      const img = w.document.createElement("img");
      img.src = f.url; img.alt = f.filename;
      img.style.cssText = "max-width:100%;border:1px solid #1c2733";
      const link = w.document.createElement("a");
      link.href = f.url; link.download = f.filename; link.textContent = f.filename;
      link.style.cssText = "color:#7a7f83;font-size:10px;text-decoration:none";
      cell.appendChild(img); cell.appendChild(link);
      grid.appendChild(cell);
    });
    w.document.body.appendChild(grid);

    setTimeout(() => frames.forEach(f => URL.revokeObjectURL(f.url)), 5 * 60 * 1000);
    return true;
  }

  async function exportPNG(asset, stage, statusLine) {
    statusLine.textContent = "Rendering PNG\u2026";
    try {
      const svgEl = stage.querySelector("svg");
      const frozen = freezeNode(asset, svgEl);
      const markup = resolvedSvgMarkup(frozen);
      const { w, h } = viewBoxSize(svgEl);
      const scale = 3;
      const img = await svgToImage(markup);
      const canvas = document.getElementById("capture-canvas");
      canvas.width = w * scale; canvas.height = h * scale;
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      downloadDataUrl(canvas.toDataURL("image/png"), asset.id + ".png");
      statusLine.textContent = "PNG downloaded";
    } catch (e) {
      statusLine.textContent = "PNG export failed";
    }
    setTimeout(() => statusLine.textContent = "", 2500);
  }

  async function exportFrameSequence(asset, stage, statusLine, btn) {
    btn.disabled = true;
    statusLine.textContent = "Preparing capture\u2026";
    const frames = [];
    try {
      const svgEl = stage.querySelector("svg");
      const { w, h } = viewBoxSize(svgEl);
      const scale = 2;
      const frameCount = 20;
      const speed = getParams(asset).speed || 1;
      const effectiveDurationMs = asset.durationMs / speed;

      const canvas = document.getElementById("capture-canvas");
      canvas.width = w * scale; canvas.height = h * scale;
      const ctx = canvas.getContext("2d");

      statusLine.textContent = "Capturing frames 0%";

      if (asset.engine === "css") {
        const anims = svgEl.getAnimations ? svgEl.getAnimations({ subtree: true }) : [];
        anims.forEach(a => a.pause());
        for (let i = 0; i < frameCount; i++) {
          anims.forEach(a => { a.currentTime = (effectiveDurationMs / frameCount) * i; });
          const frozen = bakeCssFreeze(svgEl);
          const markup = resolvedSvgMarkup(frozen);
          const img = await svgToImage(markup);
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          const blob = await new Promise(res => canvas.toBlob(res, "image/png"));
          if (!blob) throw new Error("toBlob failed");
          const url = URL.createObjectURL(blob);
          const filename = asset.id + "_" + String(i + 1).padStart(4, "0") + ".png";
          frames.push({ url, filename });
          statusLine.textContent = "Capturing frames " + Math.round(((i + 1) / frameCount) * 100) + "%";
        }
        anims.forEach(a => a.cancel());
      } else if (asset.engine === "smil") {
        svgEl.pauseAnimations();
        // Some assets stagger multiple animateMotion starts (e.g.
        // flow-droplet-stream's three particles, begin 0/dur/3/2dur/3). Sampling
        // from t=0 would capture particles before their own begin delay has
        // elapsed, popping them in from an unanimated origin. Once every
        // animation has begun the system is periodic with period `dur`, so
        // start the capture window there instead — a clean loop with no pop-in.
        const motionBegins = Array.from(svgEl.querySelectorAll("animateMotion"))
          .map(el => parseFloat(el.getAttribute("begin")) || 0);
        const startOffset = motionBegins.length ? Math.max(...motionBegins) : 0;
        for (let i = 0; i < frameCount; i++) {
          const t = startOffset + (effectiveDurationMs / 1000 / frameCount) * i;
          svgEl.setCurrentTime(t);
          const frozen = bakeSmilFreeze(svgEl);
          const markup = resolvedSvgMarkup(frozen);
          const img = await svgToImage(markup);
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          const blob = await new Promise(res => canvas.toBlob(res, "image/png"));
          if (!blob) throw new Error("toBlob failed");
          const url = URL.createObjectURL(blob);
          const filename = asset.id + "_" + String(i + 1).padStart(4, "0") + ".png";
          frames.push({ url, filename });
          statusLine.textContent = "Capturing frames " + Math.round(((i + 1) / frameCount) * 100) + "%";
        }
        svgEl.unpauseAnimations();
      }

      openFrameGalleryInNewTab(frames, asset.id);
      statusLine.textContent = "Frame sequence (" + frameCount + ") opened in a new tab \u2014 save from there";
      renderAssetInto(stage, asset);
    } catch (e) {
      statusLine.textContent = "Frame sequence export failed";
      frames.forEach(f => URL.revokeObjectURL(f.url));
    } finally {
      btn.disabled = false;
      setTimeout(() => statusLine.textContent = "", 3500);
    }
  }

  /* =========================================================
     INIT
     ========================================================= */
  navigate();
})();
</script>
<script src="../../assets/menu.js"></script>
</body>
</html>
