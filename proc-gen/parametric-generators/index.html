<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Parametric Generators</title>
<style>
  :root {
    --bg: #0a0f16;
    --panel-bg: #0d1520;
    --panel-bg-raised: #101a27;
    --line: #1c2733;
    --text: #e8e8e0;
    --muted: #93999e;

    --c-structural: #002F67;
    --c-fluid: #2FA8B0;
    --c-accent: #E8792E;
    --c-leader: #E8E8E8;
    --c-panel-base: #001A33;
    --c-panel: rgba(0,26,51,0.85);
    --c-label: #F5F7F8;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: "IBM Plex Mono", "Courier New", monospace;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; }
  button, input { font-family: inherit; }
  button { cursor: pointer; border-radius: 0; }
  button:focus-visible, input:focus-visible, a:focus-visible {
    outline: 2px solid var(--c-accent); outline-offset: 3px;
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; }
  }

  #app-header {
    display: flex; align-items: baseline; gap: 20px;
    padding: 18px 150px 18px 28px; border-bottom: 1px solid var(--line);
    position: sticky; top: 0; background: var(--bg); z-index: 10;
  }
  #app-header .crumbs {
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
    min-width: 0; flex: 1 1 auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #app-header .crumbs button {
    background: none; border: none; color: var(--c-accent); font-size: 11px;
    letter-spacing: 0.08em; text-transform: uppercase; padding: 0; font-family: inherit;
  }
  #app-header .crumbs button:hover { text-decoration: underline; }
  #app-header .mark { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; margin-left: auto; flex: none; }
  #app-header .wordmark { font-size: 14px; letter-spacing: 0.28em; font-weight: 500; margin-right: 24px; flex: none; }
  #app-header .wordmark b { color: var(--c-accent); font-weight: 500; }
  @media (max-width: 600px) {
    #app-header { padding: 14px 120px 14px 18px; gap: 12px; }
  }
  #app-main { padding: 28px; max-width: 1400px; margin: 0 auto; }

  .page-head { margin-bottom: 24px; }
  .page-head h1 {
    font-size: 17px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text); margin: 0 0 6px 0; font-weight: 500;
  }
  .page-head p { color: var(--muted); font-size: 12px; margin: 0; max-width: 62ch; line-height: 1.6; }
  .up-link {
    display: inline-flex; align-items: center; gap: 5px;
    background: none; border: none; color: var(--c-accent);
    font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 0; margin-bottom: 10px; font-family: inherit;
  }
  .up-link:hover { text-decoration: underline; }
  .up-icon { font-size: 12px; line-height: 1; }

  .card-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1px; background: var(--line); border: 1px solid var(--line);
  }
  .card {
    background: var(--panel-bg); padding: 20px; min-height: 130px;
    display: flex; flex-direction: column; gap: 10px; text-align: left;
    border: none; color: var(--text); transition: background 0.15s ease;
  }
  .card.active { cursor: pointer; }
  .card.active:hover { background: var(--panel-bg-raised); }
  .card .tag { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--c-accent); }
  .card.planned .tag { color: var(--muted); }
  .card h2 { font-size: 13px; margin: 0; font-weight: 500; }
  .card p { font-size: 12px; color: var(--muted); margin: 0; line-height: 1.6; }
  .card.planned { opacity: 0.55; border: 1px dashed var(--line); background: transparent; }
  .card.subtype-card { padding-bottom: 12px; }
  .mini-stage {
    margin-top: 4px; background: var(--stage-bg, #060a10); border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    min-height: 90px; padding: 8px; overflow: hidden;
  }
  .mini-stage svg { max-width: 100%; height: auto; display: block; }

  /* Collapsed-by-default (Lens 4B.1 — the one intentional exception to
     "everything defaults open" in this pass): a rarely-used advanced panel
     that used to dominate every customize screen. */
  .palette-details {
    background: var(--panel-bg); border: 1px solid var(--line); margin-bottom: 16px;
  }
  .palette-details > summary {
    padding: 14px 18px; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text); font-weight: 500; cursor: pointer; list-style: none;
  }
  .palette-details > summary::-webkit-details-marker { display: none; }
  .palette-details > summary .chev { display: inline-block; color: var(--c-accent); margin-right: 4px; transition: transform 0.15s ease; }
  .palette-details[open] > summary .chev { transform: rotate(90deg); }
  .palette-panel {
    display: flex; flex-wrap: wrap; gap: 18px; padding: 4px 18px 16px;
  }
  .palette-role { display: flex; align-items: center; gap: 8px; }
  .palette-role label { font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
  .palette-role input[type=color] { width: 28px; height: 28px; padding: 0; border: 1px solid var(--line); background: none; }
  .palette-actions { display: flex; gap: 8px; align-items: center; margin-left: auto; }
  .save-status { font-size: 10px; color: var(--muted); min-width: 90px; }

  .param-panel {
    display: flex; flex-wrap: wrap; gap: 18px; align-items: center;
    padding: 14px 18px; background: var(--panel-bg); border: 1px solid var(--line); margin-bottom: 16px;
  }
  .param-row { display: flex; align-items: center; gap: 8px; }
  .param-row label { font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
  .param-row input[type=range] { width: 100px; accent-color: var(--c-accent); }
  .param-row input[type=checkbox] { accent-color: var(--c-accent); width: 16px; height: 16px; }
  .param-value { font-size: 10px; color: var(--text); min-width: 34px; text-align: right; }
  .param-panel .btn { margin-left: auto; }
  .param-hint { flex-basis: 100%; font-size: 12px; color: var(--muted); }

  /* Texture tool control panel: ordered, labeled sections stacked vertically
     (Lens 4A reorg) — each .control-section holds a .section-label header
     (or <summary class="section-label"> for the two <details open> blocks)
     plus a .texture-sliders row-wrap body. */
  .texture-controls { align-items: stretch; flex-direction: column; flex-wrap: nowrap; gap: 22px; }
  .control-section { width: 100%; }
  .texture-sliders { display: flex; flex-wrap: wrap; gap: 18px; align-items: center; }
  .pattern-groups { display: flex; flex-wrap: wrap; gap: 18px; }
  .pattern-group { display: flex; flex-direction: column; gap: 6px; }
  .pattern-group-label {
    font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted);
  }
  .pattern-select { display: flex; gap: 6px; }
  .section-label {
    display: block; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text); font-weight: 500; border-bottom: 1px solid var(--line); padding-bottom: 8px; margin-bottom: 4px;
  }
  summary.section-label { cursor: pointer; list-style: none; }
  summary.section-label::-webkit-details-marker { display: none; }
  summary.section-label .chev { display: inline-block; color: var(--c-accent); margin-right: 4px; transition: transform 0.15s ease; }
  details[open] > summary.section-label .chev { transform: rotate(90deg); }
  details.control-section > .texture-sliders { padding-top: 14px; }
  .export-section {
    padding: 14px 18px; background: var(--panel-bg); border: 1px solid var(--line);
    margin-bottom: 16px; display: flex; flex-direction: column; gap: 12px;
  }
  .preview-caption { flex-basis: 100%; font-size: 12px; color: var(--muted); text-align: center; margin-top: 2px; }
  .canvas-row { display: flex; flex-wrap: wrap; gap: 1px; background: var(--line); border: 1px solid var(--line); margin-bottom: 16px; }
  .canvas-panel { background: var(--panel-bg); padding: 16px; flex: 1 1 260px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .canvas-panel-title { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); align-self: flex-start; }
  .canvas-panel canvas { width: 100%; max-width: 320px; height: auto; background: var(--stage-bg, #060a10); border: 1px solid var(--line); }

  .text-field-wrap {
    display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px;
    padding: 14px 18px; background: var(--panel-bg); border: 1px solid var(--line); max-width: 420px;
  }
  .text-field-wrap label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .text-field-wrap input[type=text] {
    background: var(--panel-bg-raised, #060a10); border: 1px solid var(--line); color: var(--text);
    padding: 8px 10px; font-size: 13px;
  }
  .text-field-wrap input[type=text]:focus-visible { border-color: var(--c-accent); }
  .text-field-wrap .hint { font-size: 10px; color: var(--muted); }

  .large-stage {
    background: var(--stage-bg, #060a10); border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    min-height: 140px; padding: 18px; margin-bottom: 14px;
  }
  .large-stage svg { max-width: min(260px, 100%); max-height: 180px; width: auto; height: auto; display: block; }

  .btn {
    background: transparent; border: 1px solid var(--line); color: var(--text);
    font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; padding: 8px 14px;
  }
  .btn:hover { border-color: var(--c-accent); color: var(--c-accent); }
  .btn.primary { border-color: var(--c-accent); color: var(--c-accent); }
  .btn.primary:hover { background: var(--c-accent); color: var(--bg); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn:disabled:hover { border-color: var(--line); color: var(--text); }
  .cell-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .status-line { font-size: 12px; color: var(--muted); min-height: 14px; margin-top: 8px; }

  footer.note {
    margin-top: 26px; font-size: 12px; color: var(--muted); line-height: 1.7;
    border-top: 1px solid var(--line); padding-top: 14px; max-width: 74ch;
  }
</style>
<script src="../../assets/theme.js"></script>
<script src="../../assets/reveal.js"></script>
</head>
<body>
  <div id="app">
    <header id="app-header">
      <a class="wordmark" href="../../index.html">REN<b>K</b>ON</a>
      <div class="crumbs" id="crumbs"></div>
      <div class="mark">OVERLAY TOOLKIT</div>
    </header>
    <main id="app-main"></main>
  </div>
  <canvas id="capture-canvas" style="display:none"></canvas>

<script>
(function () {
  "use strict";

  /* =========================================================
     PALETTE
     ========================================================= */
  const PALETTE_ROLES = [
    { key: "structural", cssVar: "--c-structural", label: "Structural", hex: "#002F67" },
    { key: "fluid",      cssVar: "--c-fluid",      label: "Fluid",      hex: "#2FA8B0" },
    { key: "accent",     cssVar: "--c-accent",     label: "Accent",     hex: "#E8792E" },
    { key: "leader",     cssVar: "--c-leader",     label: "Leader",     hex: "#E8E8E8" },
    { key: "panel",      cssVar: "--c-panel-base", label: "Panel BG",   hex: "#001A33" },
    { key: "label",      cssVar: "--c-label",      label: "Label Text", hex: "#F5F7F8" }
  ];

  function hexToRgb(hex) {
    const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    if (!m) return { r: 0, g: 0, b: 0 };
    return { r: parseInt(m[1], 16), g: parseInt(m[2], 16), b: parseInt(m[3], 16) };
  }

  function applyPaletteToDOM(palette) {
    const root = document.documentElement.style;
    PALETTE_ROLES.forEach(role => root.setProperty(role.cssVar, palette[role.key]));
    const rgb = hexToRgb(palette.panel);
    root.setProperty("--c-panel", `rgba(${rgb.r},${rgb.g},${rgb.b},0.85)`);
  }

  function defaultPalette() {
    const p = {};
    PALETTE_ROLES.forEach(r => p[r.key] = r.hex);
    return p;
  }

  let palette = defaultPalette();
  // Reload a persisted palette on mount (Lens 4B.2 — Save/Load Palette use
  // localStorage, same reasoning as the texture tool's preset persistence
  // below: no window.storage global exists in a plain browser). Falls back
  // silently to the built-in default if nothing was saved yet.
  try {
    const savedPalette = localStorage.getItem("palette:default");
    if (savedPalette) palette = Object.assign(defaultPalette(), JSON.parse(savedPalette));
  } catch (e) {}

  /* =========================================================
     PER-ASSET LIVE PARAMS (opacity / thickness / speed / roundness)
     All four are wired through CSS custom properties set inline on
     each asset's own <svg> root (--t-mult, --s-mult, --r-mult, plus
     plain `opacity`), so adjusting a slider never has to re-render
     the markup or restart an animation — except SMIL speed, which
     has no CSS equivalent for its `dur` attribute and is re-baked
     into the template on change instead.
     ========================================================= */
  const DEFAULT_PARAMS = { opacity: 1, thickness: 1, speed: 1, roundness: 0 };
  const assetParams = {};
  function getParams(asset) {
    if (!assetParams[asset.id]) assetParams[asset.id] = Object.assign({}, DEFAULT_PARAMS, asset.paramPreset || {});
    return assetParams[asset.id];
  }
  function applyLiveParams(asset, stage) {
    const svgEl = stage.querySelector("svg");
    if (!svgEl) return;
    const p = getParams(asset);
    svgEl.style.opacity = p.opacity;
    svgEl.style.setProperty("--t-mult", p.thickness);
    if (asset.engine === "css") svgEl.style.setProperty("--s-mult", p.speed);
    if (asset.roundable) svgEl.style.setProperty("--r-mult", p.roundness + "px");
  }

  /* =========================================================
     CUSTOM TEXT STATE
     ========================================================= */
  const customText = {};

  /* =========================================================
     ASSET MANIFEST
     ========================================================= */
  let renderCounter = 0;
  function nextRid() { return "r" + (renderCounter++); }

  const ASSETS = [
    {
      id: "flow-straight", name: "Straight Run", file: "flow_straight.svg", category: "Fluid Flow",
      engine: "smil", loop: true, durationMs: 1100,
      svg(rid, speedMult) {
        speedMult = speedMult || 1;
        const pat = "fst_pat_" + rid;
        const dur = (1.1 / speedMult).toFixed(3);
        return `<svg viewBox="0 0 480 100" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
<defs>
<style>
  .fst_pipe { stroke: var(--c-structural); stroke-width: calc(3 * var(--t-mult,1)); fill: none; }
  .fst_fill { fill: url(#${pat}); }
</style>
<pattern id="${pat}" width="40" height="60" patternUnits="userSpaceOnUse">
  <rect width="40" height="60" fill="#12151700" />
  <path d="M4,10 L20,30 L4,50" fill="none" stroke="var(--c-fluid)" stroke-width="calc(6 * var(--t-mult,1))"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
  <animateTransform xlink:href="#${pat}" attributeName="patternTransform"
    attributeType="XML" type="translate" from="0 0" to="40 0"
    dur="${dur}s" repeatCount="indefinite" />
</pattern>
</defs>
<line class="fst_pipe" x1="0" y1="20" x2="480" y2="20" />
<line class="fst_pipe" x1="0" y1="80" x2="480" y2="80" />
<rect x="0" y="20" width="480" height="60" class="fst_fill" />
</svg>`;
      }
    },
    {
      id: "flow-elbow", name: "Elbow / Curved Run", file: "flow_elbow.svg", category: "Fluid Flow",
      engine: "css", loop: true, durationMs: 900,
      svg(rid) {
        return `<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  .fel_wall { fill: none; stroke: var(--c-structural); stroke-width: calc(34 * var(--t-mult,1)); stroke-linecap: round; }
  .fel_dash { fill: none; stroke: var(--c-fluid); stroke-width: calc(10 * var(--t-mult,1)); stroke-linecap: round;
    stroke-dasharray: 0.05 0.055; animation: fel_march_${rid} 0.9s linear infinite;
    animation-duration: calc(0.9s / var(--s-mult,1)); }
  @keyframes fel_march_${rid} { to { stroke-dashoffset: -0.21; } }
</style></defs>
<path class="fel_wall" d="M40,260 L40,140 Q40,40 140,40 L260,40" />
<path class="fel_dash" pathLength="1" d="M40,260 L40,140 Q40,40 140,40 L260,40" />
</svg>`;
      }
    },
    {
      id: "flow-pulse-wave", name: "Traveling Pulse", file: "flow_pulse_wave.svg", category: "Fluid Flow",
      engine: "smil", loop: true, durationMs: 1800,
      svg(rid, speedMult) {
        speedMult = speedMult || 1;
        const grad = "fpw_grad_" + rid;
        const dur = (1.8 / speedMult).toFixed(3);
        return `<svg viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
<defs>
<radialGradient id="${grad}" cx="50%" cy="50%" r="50%">
  <stop offset="0%" style="stop-color:#8FE3E0; stop-opacity:0.95" />
  <stop offset="100%" style="stop-color:var(--c-fluid); stop-opacity:0" />
</radialGradient>
<style>
  .fpw_tube { fill: none; stroke: var(--c-structural); stroke-width: calc(40 * var(--t-mult,1)); stroke-linecap: round; }
  .fpw_inner { fill: none; stroke: #001A33; stroke-width: calc(30 * var(--t-mult,1)); stroke-linecap: round; }
</style>
</defs>
<path id="fpw_path_${rid}" class="fpw_tube" d="M20,50 L380,50" />
<path class="fpw_inner" d="M20,50 L380,50" />
<ellipse data-role="motion-target" rx="26" ry="13" fill="url(#${grad})">
  <animateMotion dur="${dur}s" repeatCount="indefinite" path="M20,50 L380,50" rotate="auto" />
</ellipse>
</svg>`;
      }
    },
    {
      id: "flow-chevron-unit", name: "Static Chevron", file: "flow_chevron_unit.svg", category: "Fluid Flow",
      engine: "static", loop: false, durationMs: 0,
      svg() {
        return `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
<path d="M14,10 L44,30 L14,50" fill="none" style="stroke:var(--c-fluid)"
      stroke-width="calc(8 * var(--t-mult,1))" stroke-linecap="round" stroke-linejoin="round" />
</svg>`;
      }
    },
    {
      id: "flow-spiral-vortex", name: "Spiral Vortex", file: "flow_spiral_vortex.svg", category: "Fluid Flow",
      engine: "css", loop: true, durationMs: 3000,
      svg(rid) {
        return `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  .fsv_ring { fill: none; stroke: var(--c-fluid); stroke-width: calc(3 * var(--t-mult,1)); stroke-dasharray: 10 14;
    transform-box: fill-box; transform-origin: center; animation: fsv_spin_${rid} 3s linear infinite;
    animation-duration: calc(3s / var(--s-mult,1)); }
  .fsv_ring2 { fill: none; stroke: var(--c-structural); stroke-width: calc(2 * var(--t-mult,1)); stroke-dasharray: 6 10;
    transform-box: fill-box; transform-origin: center; animation: fsv_spinrev_${rid} 1.8s linear infinite;
    animation-duration: calc(1.8s / var(--s-mult,1)); }
  .fsv_core { fill: var(--c-accent); transform-box: fill-box; transform-origin: center;
    animation: fsv_pulse_${rid} 1.2s ease-in-out infinite; animation-duration: calc(1.2s / var(--s-mult,1)); }
  @keyframes fsv_spin_${rid} { to { transform: rotate(360deg); } }
  @keyframes fsv_spinrev_${rid} { to { transform: rotate(-360deg); } }
  @keyframes fsv_pulse_${rid} { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(0.35); opacity: 0.4; } }
</style></defs>
<circle class="fsv_ring" cx="60" cy="60" r="40" />
<circle class="fsv_ring2" cx="60" cy="60" r="24" />
<circle class="fsv_core" cx="60" cy="60" r="5" />
</svg>`;
      }
    },
    {
      id: "flow-branch-split", name: "Branch Split", file: "flow_branch_split.svg", category: "Fluid Flow",
      engine: "css", loop: true, durationMs: 900,
      svg(rid) {
        return `<svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  .fbs_wall { fill: none; stroke: var(--c-structural); stroke-width: calc(22 * var(--t-mult,1)); stroke-linecap: round; }
  .fbs_dash { fill: none; stroke: var(--c-fluid); stroke-width: calc(7 * var(--t-mult,1)); stroke-linecap: round;
    stroke-dasharray: 0.05 0.06; animation: fbs_march_${rid} 0.9s linear infinite;
    animation-duration: calc(0.9s / var(--s-mult,1)); }
  @keyframes fbs_march_${rid} { to { stroke-dashoffset: -0.22; } }
</style></defs>
<path class="fbs_wall" d="M100,150 L100,90 Q100,68 80,54 L38,22" />
<path class="fbs_wall" d="M100,90 Q100,68 120,54 L162,22" />
<path class="fbs_dash" pathLength="1" d="M100,150 L100,90 Q100,68 80,54 L38,22" />
<path class="fbs_dash" pathLength="1" d="M100,90 Q100,68 120,54 L162,22" />
</svg>`;
      }
    },
    {
      id: "flow-surge-pulse-bar", name: "Surge Pulse Bar", file: "flow_surge_pulse_bar.svg", category: "Fluid Flow",
      engine: "css", loop: true, durationMs: 2000, roundable: true,
      svg(rid) {
        return `<svg viewBox="0 0 60 140" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  .fpb_frame { fill: none; stroke: var(--c-structural); stroke-width: calc(3 * var(--t-mult,1));
    rx: var(--r-mult,0); ry: var(--r-mult,0); }
  .fpb_fill { fill: var(--c-fluid); rx: var(--r-mult,0); ry: var(--r-mult,0);

  ASSETS.forEach(a => { if (a.hasText) customText[a.id] = a.textDefault; });

  const CATEGORIES = [
    { slug: "fluid-flow", label: "Fluid Flow", blurb: "Directional flow indicators for pipe and tube runs." },
    { slug: "splashes",   label: "Splashes",   blurb: "Droplets, drips and impact ripples — organic fluid motion." },
    { slug: "callouts",   label: "Callouts",   blurb: "Point at something on a render and label it." },
    { slug: "arrows",     label: "Arrows",     blurb: "General-purpose direction and motion, not fluid-specific." },
    { slug: "pings",      label: "Pings",      blurb: "Draw attention to a spot or a region." },
    { slug: "frame",      label: "Frame",      blurb: "Instrument-panel chrome — dividers, badges, HUD frames." }
  ];

  /* =========================================================
     RENDER + TEXT HELPERS
     ========================================================= */
  function applyText(asset, stage) {
    if (!asset.hasText) return;
    const slot = stage.querySelector("[data-text-slot]");
    if (slot) slot.textContent = customText[asset.id];
  }

  function renderAssetInto(stage, asset) {
    const rid = nextRid();
    const p = getParams(asset);
    stage.innerHTML = asset.engine === "smil" ? asset.svg(rid, p.speed) : asset.svg(rid);
    applyText(asset, stage);
    applyLiveParams(asset, stage);
  }

  function formatParamValue(key, val) {
    if (key === "opacity") return Math.round(val * 100) + "%";
    if (key === "roundness") return Math.round(val) + "px";
    return val.toFixed(2) + "x";
  }

  /* =========================================================
     TOOL REGISTRY + ROUTER
     ========================================================= */
  const TOOLS = [
    {
      id: "overlay-kit",
      title: "Overlay Asset Customizer",
      description: "Browse by type, pick a variant, then recolor, retext, adjust and export.",
      status: "active",
      mount: mountOverlayKit
    },
    {
      id: "texture-generator",
      title: "Texture & Bump Map Generator",
      description: "Procedural grayscale texture and bump-map previews from a few generation criteria.",
      status: "active",
      mount: mountTextureTool
    }
  ];

  function mountHome(main) {
    main.innerHTML = "";
    const head = document.createElement("div");
    head.className = "page-head";
    head.innerHTML = `<h1>Parametric Generators</h1><p>Procedural / parametric generators for the rendering &amp; overlay compositing pipeline. Each tile is a self-contained tool; more get added here over time.</p>`;
    main.appendChild(head);

    const grid = document.createElement("div");
    grid.className = "card-grid";

    TOOLS.forEach(tool => {
      const card = document.createElement("button");
      card.className = "card active";
      card.innerHTML = `<div class="tag">Active</div><h2>${tool.title}</h2><p>${tool.description}</p>`;
      card.addEventListener("click", () => { location.hash = "#" + tool.id; });
      grid.appendChild(card);
    });

    const placeholder = document.createElement("div");
    placeholder.className = "card planned";
    placeholder.innerHTML = `<div class="tag">Reserved</div><h2>Next tool slot</h2><p>New tools register in the TOOLS array and appear here automatically.</p>`;
    grid.appendChild(placeholder);

    main.appendChild(grid);
    setCrumbs([]);
  }

  function setCrumbs(items) {
    const el = document.getElementById("crumbs");
    el.innerHTML = "";
    const all = [{ label: "Parametric Generators", hash: "" }].concat(items);
    all.forEach((item, i) => {
      const isLast = i === all.length - 1;
      if (isLast) {
        const span = document.createElement("span");
        span.textContent = item.label;
        span.style.color = "var(--text)";
        el.appendChild(span);
      } else {
        const btn = document.createElement("button");
        btn.textContent = item.label;
        btn.addEventListener("click", () => { location.hash = item.hash; });
        el.appendChild(btn);
        const sep = document.createElement("span");
        sep.textContent = " / ";
        sep.style.color = "var(--muted)";
        el.appendChild(sep);
      }
    });
  }

  function buildPageHead(title, subtitleHtml, up) {
    const head = document.createElement("div");
    head.className = "page-head";
    if (up) {
      const upLink = document.createElement("button");
      upLink.className = "up-link";
      upLink.innerHTML = `<span class="up-icon" aria-hidden="true">&#8592;</span> Back to ${up.label}`;
      upLink.addEventListener("click", () => { location.hash = up.hash; });
      head.appendChild(upLink);
    }
    const h1 = document.createElement("h1");
    h1.textContent = title;
    head.appendChild(h1);
    if (subtitleHtml) {
      const p = document.createElement("p");
      p.innerHTML = subtitleHtml;
      head.appendChild(p);
    }
    return head;
  }

  function navigate() {
    const parts = location.hash.replace(/^#/, "").split("/").filter(Boolean);
    const main = document.getElementById("app-main");
    if (parts.length === 0) { mountHome(main); return; }
    const tool = TOOLS.find(t => t.id === parts[0]);
    if (!tool) { mountHome(main); return; }
    main.innerHTML = "";
    tool.mount(main, parts.slice(1));
  }
  window.addEventListener("hashchange", navigate);

  /* =========================================================
     OVERLAY KIT TOOL — type -> subtype -> customize
     ========================================================= */
  function mountOverlayKit(main, subpath) {
    const [catSlug, assetId] = subpath;
    if (!catSlug) { renderTypeGrid(main); return; }
    const category = CATEGORIES.find(c => c.slug === catSlug);
    if (!category) { location.hash = "#overlay-kit"; return; }
    if (!assetId) { renderSubtypeGrid(main, category); return; }
    const asset = ASSETS.find(a => a.id === assetId && a.category === category.label);
    if (!asset) { location.hash = "#overlay-kit/" + category.slug; return; }
    renderCustomize(main, category, asset);
  }

  function renderTypeGrid(main) {
    setCrumbs([{ label: "Overlay Asset Customizer", hash: "#overlay-kit" }]);
    main.appendChild(buildPageHead(
      "Select a Type",
      "Families of overlay. Pick one to see its variants.",
      { label: "Parametric Generators", hash: "" }
    ));

    const grid = document.createElement("div");
    grid.className = "card-grid";
    CATEGORIES.forEach(cat => {
      const count = ASSETS.filter(a => a.category === cat.label).length;
      const card = document.createElement("button");
      card.className = "card active";
      card.innerHTML = `<div class="tag">${count} variant${count === 1 ? "" : "s"}</div><h2>${cat.label}</h2><p>${cat.blurb}</p>`;
      card.addEventListener("click", () => { location.hash = "#overlay-kit/" + cat.slug; });
      grid.appendChild(card);
    });
    main.appendChild(grid);
  }

  function renderSubtypeGrid(main, category) {
    setCrumbs([
      { label: "Overlay Asset Customizer", hash: "#overlay-kit" },
      { label: category.label }
    ]);
    main.appendChild(buildPageHead(
      category.label,
      `${category.blurb} Pick a variant to customize and export it.`,
      { label: "Types", hash: "#overlay-kit" }
    ));

    const grid = document.createElement("div");
    grid.className = "card-grid";
    ASSETS.filter(a => a.category === category.label).forEach(asset => {
      const card = document.createElement("button");
      card.className = "card active subtype-card";
      let tag = asset.engine === "static" ? "Static" : (asset.loop ? "Loops" : "Plays once");
      card.innerHTML = `<div class="tag">${tag}</div><h2>${asset.name}</h2>`;
      const stage = document.createElement("div");
      stage.className = "mini-stage";
      card.appendChild(stage);
      card.addEventListener("click", () => { location.hash = "#overlay-kit/" + category.slug + "/" + asset.id; });
      grid.appendChild(card);
      renderAssetInto(stage, asset);
    });
    main.appendChild(grid);
  }

  function buildParamControls(asset, stage, onReset) {
    const wrap = document.createElement("div");
    wrap.className = "param-panel";
    const p = getParams(asset);

    function row(key, label, min, max, step, title) {
      const rowEl = document.createElement("div");
      rowEl.className = "param-row";
      if (title) rowEl.title = title;
      const lab = document.createElement("label");
      lab.textContent = label;
      const input = document.createElement("input");
      input.type = "range";
      input.min = min; input.max = max; input.step = step;
      input.value = p[key];
      const valSpan = document.createElement("span");
      valSpan.className = "param-value";
      valSpan.textContent = formatParamValue(key, p[key]);
      const isSmilSpeed = asset.engine === "smil" && key === "speed";
      input.addEventListener("input", () => {
        p[key] = parseFloat(input.value);
        valSpan.textContent = formatParamValue(key, p[key]);
        if (!isSmilSpeed) applyLiveParams(asset, stage);
      });
      if (isSmilSpeed) {
        input.addEventListener("change", () => renderAssetInto(stage, asset));
      }
      rowEl.appendChild(lab); rowEl.appendChild(input); rowEl.appendChild(valSpan);
      return rowEl;
    }

    wrap.appendChild(row("opacity", "Opacity", 0.15, 1, 0.05, "How see-through the overlay is"));
    wrap.appendChild(row("thickness", "Thickness", 0.25, 3, 0.05, "Stroke / line-weight multiplier"));
    if (asset.engine !== "static") wrap.appendChild(row("speed", "Speed", 0.25, 3, 0.05, "Animation playback speed multiplier"));
    if (asset.roundable) wrap.appendChild(row("roundness", "Roundness", 0, 16, 1, "Corner radius on roundable elements"));

    const resetBtn = document.createElement("button");
    resetBtn.className = "btn";
    resetBtn.textContent = "Reset Adjustments";
    resetBtn.addEventListener("click", () => {
      Object.assign(p, DEFAULT_PARAMS);
      onReset();
    });
    wrap.appendChild(resetBtn);

    if (asset.engine !== "static" && !asset.loop) {
      const hint = document.createElement("div");
      hint.className = "param-hint";
      hint.textContent = "This piece plays once — adjust Speed, then hit Replay to see it at the new pace.";
      wrap.appendChild(hint);
    }

    return wrap;
  }

  function renderCustomize(main, category, asset) {
    setCrumbs([
      { label: "Overlay Asset Customizer", hash: "#overlay-kit" },
      { label: category.label, hash: "#overlay-kit/" + category.slug },
      { label: asset.name }
    ]);
    applyPaletteToDOM(palette);

    main.appendChild(buildPageHead(
      asset.name,
      `${asset.file} — ${asset.engine === "static" ? "static reference glyph" : (asset.loop ? "loops indefinitely" : "plays once, replay below")}.`,
      { label: category.label, hash: "#overlay-kit/" + category.slug }
    ));

    const stage = document.createElement("div");
    stage.className = "large-stage";

    main.appendChild(buildPalettePanel());
    main.appendChild(buildParamControls(asset, stage, () => renderCustomize(main, category, asset)));
    if (asset.hasText) main.appendChild(buildTextField(asset, stage));

    main.appendChild(stage);
    renderAssetInto(stage, asset);

    const actions = document.createElement("div");
    actions.className = "cell-actions";

    if (asset.engine !== "static" && !asset.loop) {
      const replayBtn = document.createElement("button");
      replayBtn.className = "btn";
      replayBtn.textContent = "Replay";
      replayBtn.addEventListener("click", () => renderAssetInto(stage, asset));
      actions.appendChild(replayBtn);
    }

    const statusLine = document.createElement("div");
    statusLine.className = "status-line";

    const pngBtn = document.createElement("button");
    pngBtn.className = "btn primary";
    pngBtn.textContent = "Export PNG";
    pngBtn.addEventListener("click", () => exportPNG(asset, stage, statusLine));
    actions.appendChild(pngBtn);

    if (asset.engine !== "static") {
      const framesBtn = document.createElement("button");
      framesBtn.className = "btn";
      framesBtn.textContent = "Export Frames";
      framesBtn.addEventListener("click", () => exportFrameSequence(asset, stage, statusLine, framesBtn));
      actions.appendChild(framesBtn);
    }

    main.appendChild(actions);
    main.appendChild(statusLine);

    const foot = document.createElement("footer");
    foot.className = "note";
    foot.innerHTML = `Colors and adjustments apply live and carry back to the type/subtype screens. Export Frames renders a numbered PNG sequence and opens it in a new tab (blob: URLs, no worker, no external dependency) &mdash; SMIL assets are frame-scrubbed via native SVG time control, CSS assets via the Web Animations API.`;
    main.appendChild(foot);
  }

  function buildTextField(asset, stage) {
    const wrap = document.createElement("div");
    wrap.className = "text-field-wrap";
    const label = document.createElement("label");
    label.textContent = "Custom Text";
    const input = document.createElement("input");
    input.type = "text";
    input.maxLength = 40;
    input.value = customText[asset.id];
    input.addEventListener("input", () => {
      customText[asset.id] = input.value;
      const slot = stage.querySelector("[data-text-slot]");
      if (slot) slot.textContent = input.value;
    });
    const hint = document.createElement("div");
    hint.className = "hint";
    hint.textContent = asset.textHint || "";
    wrap.appendChild(label);
    wrap.appendChild(input);
    wrap.appendChild(hint);
    return wrap;
  }

  function buildPalettePanel() {
    // Collapsed by default (Lens 4B.1) — the one place a collapsed-by-default
    // disclosure is correct: this panel is a rarely-used advanced control
    // (recolors every asset's roles) that dominated every customize screen
    // even though most visits are here to tweak one asset's opacity/speed.
    // Every control inside stays one click away.
    const details = document.createElement("details");
    details.className = "palette-details";
    const summary = document.createElement("summary");
    summary.innerHTML = '<span class="chev" aria-hidden="true">&rsaquo;</span> Palette (advanced) — recolor all assets';
    details.appendChild(summary);

    const panel = document.createElement("div");
    panel.className = "palette-panel";

    PALETTE_ROLES.forEach(role => {
      const wrap = document.createElement("div");
      wrap.className = "palette-role";
      const label = document.createElement("label");
      label.textContent = role.label;
      const input = document.createElement("input");
      input.type = "color";
      input.value = palette[role.key];
      input.addEventListener("input", () => {
        palette[role.key] = input.value;
        applyPaletteToDOM(palette);
      });
      wrap.appendChild(label);
      wrap.appendChild(input);
      panel.appendChild(wrap);
    });

    const actions = document.createElement("div");
    actions.className = "palette-actions";
    const status = document.createElement("span");
    status.className = "save-status";

    // Storage: window.storage is an environment-injected API that's never
    // defined in a plain browser (see the identical rationale \u2014 and the
    // same fix \u2014 for the texture tool's preset persistence, mountTextureTool
    // -> presetStorageGet/Set below). Use localStorage directly so the
    // button actually works in every context this app runs in.
    const saveBtn = document.createElement("button");
    saveBtn.className = "btn";
    saveBtn.textContent = "Save Palette";
    saveBtn.addEventListener("click", () => {
      status.textContent = "Saving\u2026";
      try {
        localStorage.setItem("palette:default", JSON.stringify(palette));
        status.textContent = "Saved";
      } catch (e) { status.textContent = "Save failed"; }
      setTimeout(() => status.textContent = "", 2000);
    });

    const loadBtn = document.createElement("button");
    loadBtn.className = "btn";
    loadBtn.textContent = "Load Palette";
    loadBtn.addEventListener("click", () => {
      status.textContent = "Loading\u2026";
      try {
        const raw = localStorage.getItem("palette:default");
        if (raw) {
          palette = JSON.parse(raw);
          applyPaletteToDOM(palette);
          panel.querySelectorAll("input[type=color]").forEach((inp, i) => { inp.value = palette[PALETTE_ROLES[i].key]; });
          status.textContent = "Loaded";
        } else { status.textContent = "No saved palette"; }
      } catch (e) { status.textContent = "None saved yet"; }
      setTimeout(() => status.textContent = "", 2000);
    });

    const resetBtn = document.createElement("button");
    resetBtn.className = "btn";
    resetBtn.textContent = "Reset";
    resetBtn.addEventListener("click", () => {
      palette = defaultPalette();
      applyPaletteToDOM(palette);
      panel.querySelectorAll("input[type=color]").forEach((inp, i) => { inp.value = palette[PALETTE_ROLES[i].key]; });
    });

    actions.appendChild(saveBtn);
    actions.appendChild(loadBtn);
    actions.appendChild(resetBtn);
    actions.appendChild(status);
    panel.appendChild(actions);
    details.appendChild(panel);
    return details;
  }

  /* =========================================================
     TEXTURE & BUMP MAP GENERATOR
     First pass: a working procedural core (seeded value noise,
     plus two simpler grid/scratch generators) driven by a handful
     of sliders, with a live grayscale texture preview and a
     simulated-relief bump preview derived from the same height
     data. Both export as PNG at a higher resolution than the
     live preview. Deliberately kept to one flat screen and a
     small, obviously-extensible generator registry — more pattern
     types and normal-map (not just height) export are the natural
     next additions. Spatial (XY) tiling: Noise and Grid tile
     exactly (incl. animated); the rest are documented non-tiling —
     use the Tile Preview toggle to inspect seams.
     ========================================================= */
  const TEXTURE_PREVIEW_SIZE = 320;
  const TEXTURE_EXPORT_SIZE = 1024;

  function mulberry32(seed) {
    let s = seed >>> 0;
    return function () {
      s |= 0; s = (s + 0x6D2B79F5) | 0;
      let t = Math.imul(s ^ (s >>> 15), 1 | s);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function buildValueField(w, h, cellSize, rng) {
    const cols = Math.ceil(w / cellSize) + 2, rows = Math.ceil(h / cellSize) + 2;
    const grid = [];
    for (let y = 0; y < rows; y++) {
      const row = [];
      for (let x = 0; x < cols; x++) row.push(rng());
      grid.push(row);
    }
    return { grid, cellSize };
  }

  function sampleField(field, x, y) {
    const { grid, cellSize } = field;
    const gx = x / cellSize, gy = y / cellSize;
    const x0 = Math.floor(gx), y0 = Math.floor(gy);
    const sx = gx - x0, sy = gy - y0;
    const smooth = t => t * t * (3 - 2 * t);
    const sxs = smooth(sx), sys = smooth(sy);
    const v00 = grid[y0][x0], v10 = grid[y0][x0 + 1];
    const v01 = grid[y0 + 1][x0], v11 = grid[y0 + 1][x0 + 1];
    const top = v00 + (v10 - v00) * sxs;
    const bot = v01 + (v11 - v01) * sxs;
    return top + (bot - top) * sys;
  }

  // Toroidal variants used by the Noise pattern so its maps tile exactly in
  // X and Y (feature backlog #1). Two things differ from the non-tiling pair
  // above, and both are required: (1) the lattice is snapped to a whole
  // number of cells per tile (cell count = round(w / requestedCellSize),
  // min 1) — a cellSize that doesn't divide w/h evenly would still seam even
  // under modulo sampling; (2) the lattice is sampled with wraparound
  // ((x0 + 1) % cols) instead of reading into +2 padding rows/cols.
  // Deliberately a parallel pair rather than a change to
  // buildValueField/sampleField: Wood Grain, Waves, Machining Marks and
  // Paint Strokes use those as warp/flow fields and must stay byte-identical.
  function buildValueFieldTiling(w, h, cellSize, rng) {
    const cols = Math.max(1, Math.round(w / cellSize));
    const rows = Math.max(1, Math.round(h / cellSize));
    const grid = [];
    for (let y = 0; y < rows; y++) {
      const row = [];
      for (let x = 0; x < cols; x++) row.push(rng());
      grid.push(row);
    }
    return { grid, cols, rows, cellW: w / cols, cellH: h / rows };
  }

  function sampleFieldWrap(field, x, y) {
    const { grid, cols, rows, cellW, cellH } = field;
    const gx = x / cellW, gy = y / cellH;
    let x0 = Math.floor(gx), y0 = Math.floor(gy);
    const sx = gx - x0, sy = gy - y0;
    x0 = ((x0 % cols) + cols) % cols;
    y0 = ((y0 % rows) + rows) % rows;
    const x1 = (x0 + 1) % cols, y1 = (y0 + 1) % rows;
    const smooth = t => t * t * (3 - 2 * t);
    const sxs = smooth(sx), sys = smooth(sy);
    const v00 = grid[y0][x0], v10 = grid[y0][x1];
    const v01 = grid[y1][x0], v11 = grid[y1][x1];
    const top = v00 + (v10 - v00) * sxs;
    const bot = v01 + (v11 - v01) * sxs;
    return top + (bot - top) * sys;
  }

  function noiseData(w, h, p, seed) {
    const rng = mulberry32(seed);
    const octaves = Math.max(1, Math.round(p.octaves));
    const fields = [];
    let freq = Math.max(4, p.scale);
    for (let o = 0; o < octaves; o++) {
      // Tiling lattice per octave -> every octave (and therefore the summed
      // fBm) wraps exactly at x = w and y = h.
      fields.push(buildValueFieldTiling(w, h, Math.max(4, freq), rng));
      freq = Math.max(4, freq / 2);
    }
    const amps = []; let amp = 1, maxAmp = 0;
    for (let o = 0; o < octaves; o++) { amps.push(amp); maxAmp += amp; amp *= p.roughness; }
    const data = new Float32Array(w * h);
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        let v = 0;
        for (let o = 0; o < octaves; o++) v += sampleFieldWrap(fields[o], x, y) * amps[o];
        data[y * w + x] = v / maxAmp;
      }
    }
    return data;
  }

  function generateNoise(w, h, p) {
    const data = noiseData(w, h, p, p.seed);
    if (!p.animate) return data;
    // Animated: cyclically blend toward a second independent field and back.
    // weight = 0 at time 0 and 1, peaks at 0.5 -> guaranteed-seamless loop; the
    // static (time 0 / animation-off) frame is identical to the un-animated output.
    // Both fields come from noiseData and therefore both tile spatially, so
    // every blended frame of the animation tiles too.
    const dataB = noiseData(w, h, p, (p.seed ^ 0x9e3779b9) >>> 0);
    const wgt = 0.5 - 0.5 * Math.cos(2 * Math.PI * (p.time || 0));
    for (let i = 0; i < data.length; i++) data[i] = data[i] * (1 - wgt) + dataB[i] * wgt;
    return data;
  }

  function generateGrid(w, h, p) {
    const rng = mulberry32(p.seed);
    const count = Math.max(2, Math.round(p.count));
    const spacing = Math.max(4, w / count);
    const thickness = Math.min(spacing * 0.4, Math.max(1, p.scale * 0.08 * p.contrast));
    const jitter = p.roughness * spacing * 0.15;
    // Animated: a phase-shifted sinusoidal displacement of the sampling coords
    // reads as heat-shimmer / vibration. Period 1 in time -> seamless loop.
    const tm = p.time || 0;
    const shimmer = p.animate ? spacing * 0.18 : 0;
    // Spatial tiling (feature backlog #1): the static grid already tiles
    // because spacing = w / count divides w exactly (per-pixel jitter is
    // structureless noise, uniform across the seam). The shimmer's spatial
    // frequency is quantized to a whole number of cycles per tile (nearest
    // to the old fixed 0.06 rad/px; ~3 cycles at 320px) so animated frames
    // wrap exactly at x = w and y = h with the same visual character.
    const TAU = 2 * Math.PI;
    const shimFreqY = TAU * Math.max(1, Math.round(0.06 * h / TAU)) / h;
    const shimFreqX = TAU * Math.max(1, Math.round(0.06 * w / TAU)) / w;
    const data = new Float32Array(w * h);
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const jx = x + (rng() - 0.5) * jitter + shimmer * Math.sin(TAU * tm + y * shimFreqY);
        const jy = y + (rng() - 0.5) * jitter + shimmer * Math.cos(TAU * tm + x * shimFreqX);
        const mx = ((jx % spacing) + spacing) % spacing;
        const my = ((jy % spacing) + spacing) % spacing;
        data[y * w + x] = (mx < thickness || my < thickness) ? 1 : 0.15;
      }
    }
    return data;
  }

  function generateScratches(w, h, p) {
    const rng = mulberry32(p.seed);
    const data = new Float32Array(w * h).fill(0.5);
    const count = Math.max(1, Math.round(p.count));
    // Animated: each streak fades in/out once per loop on its own staggered
    // phase (film-grain / static flicker). Envelope is periodic -> seamless.
    const tm = p.time || 0;
    for (let i = 0; i < count; i++) {
      const x0 = rng() * w;
      const y0 = rng() * h;
      const len = h * (0.2 + rng() * 0.65) * (p.scale / 60);
      const drift = (rng() - 0.5) * w * 0.25;
      const depth = (0.25 + rng() * 0.5) * Math.min(2, p.contrast);
      const env = p.animate ? Math.pow(0.5 + 0.5 * Math.sin(2 * Math.PI * (tm - i / count)), 1.6) : 1;
      const depthA = depth * env;
      const steps = Math.max(1, Math.round(len));
      for (let s = 0; s < steps; s++) {
        const t = s / steps;
        const xx = Math.round(x0 + drift * t + (rng() - 0.5) * p.roughness * 3);
        const yy = Math.round(y0 + t * len);
        if (xx >= 0 && xx < w && yy >= 0 && yy < h) {
          const idx = yy * w + xx;
          data[idx] = Math.max(0, data[idx] - depthA * 0.5);
        }
      }
    }
    return data;
  }

  function generateSplotches(w, h, p) {
    const rng = mulberry32(p.seed);
    const data = new Float32Array(w * h).fill(0.35);
    const count = Math.max(1, Math.round(p.count));
    const maxR = Math.max(4, p.scale);
    // Animated: each blob pulses size + strength on its own staggered phase
    // (boiling / bubbling surface). Period 1 in time -> seamless loop.
    const tm = p.time || 0;
    for (let i = 0; i < count; i++) {
      const cx = rng() * w, cy = rng() * h;
      let r = maxR * (0.15 + rng() * (0.15 + p.roughness * 0.25));
      let strength = 0.35 + rng() * 0.5;
      if (p.animate) {
        const pulse = 0.5 + 0.5 * Math.sin(2 * Math.PI * (tm - i / count));
        r *= 0.6 + 0.4 * pulse;
        strength *= 0.5 + 0.5 * pulse;
      }
      const x0 = Math.max(0, Math.floor(cx - r)), x1 = Math.min(w, Math.ceil(cx + r));
      const y0 = Math.max(0, Math.floor(cy - r)), y1 = Math.min(h, Math.ceil(cy + r));
      for (let y = y0; y < y1; y++) {
        for (let x = x0; x < x1; x++) {
          const dx = x - cx, dy = y - cy;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < r) {
            const falloff = 1 - dist / r;
            const idx = y * w + x;
            data[idx] = Math.min(1, data[idx] + falloff * falloff * strength);
          }
        }
      }
    }
    return data;
  }

  // Shared Worley (cellular noise) field: a jittered grid of one feature point
  // per cell, searched over its 3x3 cell neighborhood -- the standard
  // efficient approach so a per-pixel nearest-point query stays O(1) instead
  // of O(n). Cellular and Cracks both build on this; they differ only in how
  // they read d1 (distance to nearest point) / d2 (second-nearest).
  function buildWorleyField(w, h, cellSize, rng) {
    const cols = Math.ceil(w / cellSize) + 2, rows = Math.ceil(h / cellSize) + 2;
    const pts = [];
    for (let gy = 0; gy < rows; gy++) {
      const row = [];
      for (let gx = 0; gx < cols; gx++) {
        row.push({ x: (gx - 1 + rng()) * cellSize, y: (gy - 1 + rng()) * cellSize, phase: rng() });
      }
      pts.push(row);
    }
    return { pts, cellSize };
  }

  function sampleWorley(field, x, y, wiggle, time) {
    const { pts, cellSize } = field;
    const cx = Math.floor(x / cellSize) + 1, cy = Math.floor(y / cellSize) + 1;
    let d1 = Infinity, d2 = Infinity;
    for (let oy = -1; oy <= 1; oy++) {
      const row = pts[cy + oy];
      for (let ox = -1; ox <= 1; ox++) {
        const pt = row[cx + ox];
        let px = pt.x, py = pt.y;
        if (wiggle) {
          const a = 2 * Math.PI * (time - pt.phase);
          px += wiggle * Math.sin(a); py += wiggle * Math.cos(a);
        }
        const dx = x - px, dy = y - py;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < d1) { d2 = d1; d1 = d; } else if (d < d2) { d2 = d; }
      }
    }
    return { d1, d2 };
  }

  function generateCellular(w, h, p) {
    const rng = mulberry32(p.seed);
    const count = Math.max(2, Math.round(p.count));
    const cellSize = Math.max(4, w / count);
    const field = buildWorleyField(w, h, cellSize, rng);
    // Animated: feature points wiggle around their own seeded phase -- cells
    // breathe/drift in place. Period 1 in time -> seamless loop.
    const wiggle = p.animate ? cellSize * 0.18 : 0;
    const tm = p.time || 0;
    const soft = 0.15 + p.roughness * 0.7;
    const data = new Float32Array(w * h);
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const { d1 } = sampleWorley(field, x, y, wiggle, tm);
        data[y * w + x] = 1 - Math.min(1, d1 / (cellSize * soft));
      }
    }
    return data;
  }

  function generateCracks(w, h, p) {
    const rng = mulberry32(p.seed);
    const count = Math.max(2, Math.round(p.count));
    const cellSize = Math.max(4, w / count);
    const field = buildWorleyField(w, h, cellSize, rng);
    const wiggle = p.animate ? cellSize * 0.1 : 0;
    const tm = p.time || 0;
    const width = Math.max(0.01, 0.06 + p.roughness * 0.12) * cellSize;
    const data = new Float32Array(w * h).fill(1);
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const { d1, d2 } = sampleWorley(field, x, y, wiggle, tm);
        const edge = d2 - d1;
        if (edge < width) data[y * w + x] = edge / width;
      }
    }
    return data;
  }

  function generateWood(w, h, p) {
    const seedRng = mulberry32(p.seed);
    const cx = (0.2 + seedRng() * 0.6) * w, cy = (0.2 + seedRng() * 0.6) * h;
    const warpField = buildValueField(w, h, Math.max(8, p.scale), mulberry32((p.seed ^ 0x2545F491) >>> 0));
    const ringSpacing = Math.max(3, p.scale * 0.35);
    const warpAmt = p.roughness * ringSpacing * 2;
    // Animated: rings travel outward from the pith at a steady rate -- phase
    // is subtracted inside the sine, so time 0 and time 1 land on the same
    // ring position (seamless loop).
    const phase = p.animate ? (p.time || 0) : 0;
    const data = new Float32Array(w * h);
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const dx = x - cx, dy = y - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const warp = (sampleField(warpField, x, y) - 0.5) * warpAmt;
        const ring = Math.sin((dist + warp) / ringSpacing * 2 * Math.PI - phase * 2 * Math.PI);
        data[y * w + x] = 0.5 + 0.5 * ring;
      }
    }
    return data;
  }

  function generateWaves(w, h, p) {
    const rng = mulberry32(p.seed);
    const freq = Math.max(4, p.scale);
    const angle = rng() * Math.PI;
    const ax = Math.cos(angle), ay = Math.sin(angle);
    const warpField = buildValueField(w, h, Math.max(8, p.scale), mulberry32((p.seed ^ 0x85EBCA6B) >>> 0));
    const warpAmt = p.roughness * freq * 0.6;
    // Animated: bands travel along their own axis -- phase subtracted inside
    // the sine gives a seamless loop, same trick as Wood Grain's rings.
    const phase = p.animate ? (p.time || 0) : 0;
    const data = new Float32Array(w * h);
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const warp = (sampleField(warpField, x, y) - 0.5) * warpAmt;
        const proj = (x * ax + y * ay + warp) / freq;
        const wave = Math.sin(proj * 2 * Math.PI - phase * 2 * Math.PI);
        data[y * w + x] = 0.5 + 0.5 * wave;
      }
    }
    return data;
  }

  /* ---------------------------------------------------------
     PRO FINISH -- art-directed fabrication textures
     (docs/ADVANCED_TEXTURES.md). Unlike the generic patterns
     above, these model a specific real finishing process, and
     they use the per-pattern custom-param mechanism: extra
     controls declared in PATTERN_META[kind].custom, values
     living in state.custom[kind][key]. Custom *length* params
     (pitch, strokeLength) are specified in px at preview size
     and normalized by w / TEXTURE_PREVIEW_SIZE inside the
     generator, so the 320px preview and the 1024px export show
     the same texture rather than a 3x-finer one.
     --------------------------------------------------------- */

  function generateMachining(w, h, p) {
    const c = (p.custom && p.custom.machining) || {};
    const res = w / TEXTURE_PREVIEW_SIZE; // custom lengths are "px at preview size"
    const pitch = Math.max(2, c.pitch != null ? c.pitch : 10) * res;
    const waviness = c.waviness != null ? c.waviness : 0.15;
    const radial = c.direction === "radial";
    const rng = mulberry32(p.seed);
    const angle = rng() * Math.PI; // seeded pass direction (linear mode)
    const ax = Math.cos(angle), ay = Math.sin(angle);
    // Low-frequency toolpath wander: a real mill/lathe pass is not perfectly
    // straight at the pixel level. Amplitude driven by `waviness`, kept
    // proportional to pitch so grooves wander without smearing together.
    const warpField = buildValueField(w, h, Math.max(8, pitch * 4), mulberry32((p.seed ^ 0x3C6EF372) >>> 0));
    const warpAmt = waviness * pitch * 1.5;
    // Roughness = groove-edge sharpness: low keeps the crisp full-depth
    // cosine groove, high flattens it toward mid-gray (a worn / fine pass).
    const depth = Math.min(1, 1.05 - p.roughness);
    // Animated: the toolpath advances -- phase subtracted inside the cosine,
    // so time 0 and time 1 land on the same groove position (seamless loop).
    const phase = p.animate ? (p.time || 0) : 0;
    const data = new Float32Array(w * h);
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const warp = (sampleField(warpField, x, y) - 0.5) * warpAmt;
        let d;
        if (radial) {
          // Lathe/faced part: concentric grooves around the canvas center --
          // deliberately centered (unlike Wood Grain's seeded pith), because
          // a machined face reads as centered and stays placeable.
          const dx = x - w / 2, dy = y - h / 2;
          d = Math.sqrt(dx * dx + dy * dy);
        } else {
          d = x * ax + y * ay;
        }
        const groove = Math.cos(((d + warp) / pitch - phase) * 2 * Math.PI);
        data[y * w + x] = 0.5 + 0.5 * groove * depth;
      }
    }
    return data;
  }

  function generatePaintStrokes(w, h, p) {
    const c = (p.custom && p.custom.paint) || {};
    const res = w / TEXTURE_PREVIEW_SIZE; // custom lengths are "px at preview size"
    const strokeLength = Math.max(8, c.strokeLength != null ? c.strokeLength : 80) * res;
    const turbulence = c.turbulence != null ? c.turbulence : 0.5;
    const rng = mulberry32(p.seed);
    const baseAngle = rng() * Math.PI;
    // Low-frequency flow field: each stroke bends with the local field value,
    // so strokes share a smoothly-varying regional direction (hand-brushed)
    // instead of one fixed global angle (printed) or unrelated random
    // segments (Scratches).
    const flowField = buildValueField(w, h, Math.max(16, w / 5), mulberry32((p.seed ^ 0x1B873593) >>> 0));
    const count = Math.max(1, Math.round(p.count));
    const stepLen = Math.max(1, 2 * res);
    const brushR = Math.max(1.5, 5 * res);
    // Roughness = dab softness: low keeps a hard-edged dab, high pushes the
    // falloff exponent up for a soft, feathered edge.
    const soft = 0.8 + p.roughness * 2.4;
    const tm = p.time || 0;
    const data = new Float32Array(w * h).fill(0.18);
    for (let i = 0; i < count; i++) {
      // All per-stroke randomness is drawn up front (never inside the step
      // loop), so a partially-revealed stroke follows the exact same path as
      // the fully-grown one and later strokes are unaffected by reveal.
      let sx = rng() * w, sy = rng() * h;
      const strength = 0.3 + rng() * 0.4;
      const stagger = rng();
      // Animated: progressive reveal -- each stroke grows along its length as
      // time runs 0 -> 1 (slightly staggered per stroke), then resets and
      // re-grows each cycle. NOTE (deliberate exception to the seamless-loop
      // convention): the frame just before the loop point shows fully grown
      // strokes and frame 0 shows them at 0%, i.e. a one-frame "snap" at the
      // loop boundary. Documented as acceptable in docs/ADVANCED_TEXTURES.md
      // -- not a bug. Static (animate off) renders the fully grown strokes.
      const reveal = p.animate ? Math.max(0, Math.min(1, tm * 1.25 - stagger * 0.25)) : 1;
      const steps = Math.max(2, Math.round(strokeLength / stepLen));
      const drawn = Math.round(steps * reveal);
      for (let s = 0; s < drawn; s++) {
        const t = s / steps;
        // soft round brush dab, width tapering slightly at both stroke ends
        const r = brushR * (0.45 + 0.55 * Math.sin(Math.PI * t));
        const x0 = Math.max(0, Math.floor(sx - r)), x1 = Math.min(w, Math.ceil(sx + r));
        const y0 = Math.max(0, Math.floor(sy - r)), y1 = Math.min(h, Math.ceil(sy + r));
        for (let yy = y0; yy < y1; yy++) {
          for (let xx = x0; xx < x1; xx++) {
            const dx = xx - sx, dy = yy - sy;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < r) {
              const fall = Math.pow(1 - dist / r, soft);
              const idx = yy * w + xx;
              data[idx] = Math.min(1, data[idx] + fall * strength * 0.45);
            }
          }
        }
        // step along the local flow direction; turbulence scales how far the
        // field bends the stroke off the shared base angle. Sample coords are
        // clamped to the canvas: strokes may wander off-canvas (their dabs
        // just stop depositing) but the value field only covers the canvas
        // plus a small margin -- sampling beyond it reads off the grid.
        const fx = Math.min(w - 1, Math.max(0, sx));
        const fy = Math.min(h - 1, Math.max(0, sy));
        const bend = (sampleField(flowField, fx, fy) - 0.5) * turbulence * 3;
        sx += Math.cos(baseAngle + bend) * stepLen;
        sy += Math.sin(baseAngle + bend) * stepLen;
      }
    }
    return data;
  }

  // --- P2 stretch goals (docs/ADVANCED_TEXTURES.md, "P2 -- stretch goals,
  // fleshed out") -- Knurling, Orange Peel, Anodize Swirl. Same Pro Finish
  // family and custom-param mechanism as Machining Marks/Paint Strokes
  // above; built in the doc's suggested order (cheapest/most-reused-
  // machinery first): Knurling (pure math, reuses Machining's cosine-groove
  // profile), Orange Peel (small extension of Cellular's Worley machinery),
  // Anodize Swirl (extends Paint Strokes' accumulation loop with ring-biased
  // seeding + a tangential base direction).

  function generateKnurling(w, h, p) {
    const c = (p.custom && p.custom.knurl) || {};
    const res = w / TEXTURE_PREVIEW_SIZE; // custom lengths are "px at preview size"
    const pitch = Math.max(2, c.pitch != null ? c.pitch : 10) * res;
    const angleDeg = c.angle != null ? c.angle : 30;
    const cross = c.mode !== "straight"; // default: diamond (crossed) knurl
    const angleA = angleDeg * Math.PI / 180;
    const angleB = angleA + Math.PI / 2; // second band derived from angle+90,
    // not a hardcoded +-45 -- so `angle` drives the whole pattern's
    // orientation and any crossing (not just a symmetric diamond) is reachable.
    const axA = Math.cos(angleA), ayA = Math.sin(angleA);
    const axB = Math.cos(angleB), ayB = Math.sin(angleB);
    // Roughness = groove-edge sharpness, same role as Machining Marks (low
    // keeps a crisp full-depth cosine groove, high flattens toward mid-gray).
    const depth = Math.min(1, 1.05 - p.roughness);
    // Animated: both bands' phase advances together -- reads as the tool
    // still cutting. Phase subtracted inside the cosine -> time 0 and time 1
    // land on the same groove position (seamless loop).
    const phase = p.animate ? (p.time || 0) : 0;
    const data = new Float32Array(w * h);
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const dA = x * axA + y * ayA;
        const bandA = 0.5 + 0.5 * Math.cos((dA / pitch - phase) * 2 * Math.PI) * depth;
        if (cross) {
          const dB = x * axB + y * ayB;
          const bandB = 0.5 + 0.5 * Math.cos((dB / pitch - phase) * 2 * Math.PI) * depth;
          data[y * w + x] = bandA * bandB;
        } else {
          data[y * w + x] = bandA;
        }
      }
    }
    return data;
  }

  function generateOrangePeel(w, h, p) {
    const c = (p.custom && p.custom.peel) || {};
    const blend = c.blend != null ? c.blend : 0.25;
    const rng = mulberry32(p.seed);
    const count = Math.max(2, Math.round(p.count));
    // Fine dimpling reads at a noticeably smaller cell size than Cellular's
    // own blobs -- w/(count*3), not Cellular's w/count.
    const cellSize = Math.max(3, w / (count * 3));
    const field = buildWorleyField(w, h, cellSize, rng);
    // Low-frequency noise blended in for irregularity, so cells don't look
    // perfectly regular -- sized to the same order as the Worley cells
    // themselves (not an unrelated frequency) so the two read as one finish.
    const noiseField = buildValueField(w, h, Math.max(4, cellSize * 1.5), mulberry32((p.seed ^ 0x27D4EB2F) >>> 0));
    // Animated: reuse Cellular's wiggle-the-feature-points trick verbatim --
    // already seamless, already proven; this is a finish variant of
    // Cellular, not a new animation personality.
    const wiggle = p.animate ? cellSize * 0.18 : 0;
    const tm = p.time || 0;
    // Roughness = Worley falloff softness, same role it plays in generateCellular.
    const soft = 0.15 + p.roughness * 0.7;
    const data = new Float32Array(w * h);
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const { d1 } = sampleWorley(field, x, y, wiggle, tm);
        const worleyValue = 1 - Math.min(1, d1 / (cellSize * soft));
        const noiseValue = sampleField(noiseField, x, y);
        data[y * w + x] = worleyValue * (1 - blend) + noiseValue * blend;
      }
    }
    return data;
  }

  function generateAnodizeSwirl(w, h, p) {
    const c = (p.custom && p.custom.anodize) || {};
    const res = w / TEXTURE_PREVIEW_SIZE; // custom lengths are "px at preview size"
    const strokeLength = Math.max(8, c.strokeLength != null ? c.strokeLength : 80) * res;
    const turbulence = c.turbulence != null ? c.turbulence : 0.5;
    const rng = mulberry32(p.seed);
    const cx = w / 2, cy = h / 2;
    const maxRadius = Math.sqrt(cx * cx + cy * cy);
    // Same flow field role as Paint Strokes: perturbs the base direction so
    // strokes don't look mechanically perfect.
    const flowField = buildValueField(w, h, Math.max(16, w / 5), mulberry32((p.seed ^ 0x1B873593) >>> 0));
    const count = Math.max(1, Math.round(p.count));
    const stepLen = Math.max(1, 2 * res);
    const brushR = Math.max(1.5, 5 * res);
    // Roughness = dab softness, same role it plays in generatePaintStrokes.
    const soft = 0.8 + p.roughness * 2.4;
    const tm = p.time || 0;
    const data = new Float32Array(w * h).fill(0.18);
    for (let i = 0; i < count; i++) {
      // Ring-biased seeding: sqrt(rng()) gives a uniform-area distribution
      // over the disc (rather than uniform-radius, which over-concentrates
      // points near dead-center) -- radial brushing reads denser away from
      // the center, not uniformly across the whole canvas.
      const r = maxRadius * Math.sqrt(rng());
      const theta = rng() * 2 * Math.PI;
      let sx = cx + r * Math.cos(theta), sy = cy + r * Math.sin(theta);
      const strength = 0.3 + rng() * 0.4;
      const stagger = rng();
      // Animated: same progressive-reveal trick as Paint Strokes, including
      // the same documented one-frame loop-boundary snap (frame just before
      // the loop shows fully-grown strokes, frame 0 shows 0% grown) -- this
      // is the same deliberate, accepted trade-off Paint Strokes' own
      // comment calls out, not a new bug. Static (animate off) renders the
      // fully grown strokes, matching Paint Strokes' convention.
      const reveal = p.animate ? Math.max(0, Math.min(1, tm * 1.25 - stagger * 0.25)) : 1;
      const steps = Math.max(2, Math.round(strokeLength / stepLen));
      const drawn = Math.round(steps * reveal);
      for (let s = 0; s < drawn; s++) {
        const t = s / steps;
        const rr = brushR * (0.45 + 0.55 * Math.sin(Math.PI * t));
        const x0 = Math.max(0, Math.floor(sx - rr)), x1 = Math.min(w, Math.ceil(sx + rr));
        const y0 = Math.max(0, Math.floor(sy - rr)), y1 = Math.min(h, Math.ceil(sy + rr));
        for (let yy = y0; yy < y1; yy++) {
          for (let xx = x0; xx < x1; xx++) {
            const dx = xx - sx, dy = yy - sy;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < rr) {
              const fall = Math.pow(1 - dist / rr, soft);
              const idx = yy * w + xx;
              data[idx] = Math.min(1, data[idx] + fall * strength * 0.45);
            }
          }
        }
        // Tangential base direction, recomputed each step from the stroke's
        // *current* position -- atan2(y - cy, x - cx) + PI/2 is perpendicular
        // to the radius vector from canvas center, so the stroke curves
        // around the center instead of following one fixed straight angle
        // (that's what makes this "radial variant of Paint Strokes" rather
        // than just Paint Strokes with a different seed distribution). Still
        // perturbed by the same turbulence-scaled flow-field bend Paint
        // Strokes uses, so it doesn't look mechanically perfect.
        const baseAngle = Math.atan2(sy - cy, sx - cx) + Math.PI / 2;
        const fx = Math.min(w - 1, Math.max(0, sx));
        const fy = Math.min(h - 1, Math.max(0, sy));
        const bend = (sampleField(flowField, fx, fy) - 0.5) * turbulence * 3;
        sx += Math.cos(baseAngle + bend) * stepLen;
        sy += Math.sin(baseAngle + bend) * stepLen;
      }
    }
    return data;
  }

  const TEXTURE_GENERATORS = {
    noise: generateNoise, cellular: generateCellular, wood: generateWood,
    grid: generateGrid, waves: generateWaves,
    scratches: generateScratches, splotches: generateSplotches, cracks: generateCracks,
    machining: generateMachining, paint: generatePaintStrokes,
    knurl: generateKnurling, peel: generateOrangePeel, anodize: generateAnodizeSwirl
  };

  const PATTERN_GROUPS = [
    { label: "Organic", kinds: ["noise", "cellular", "wood"] },
    { label: "Geometric", kinds: ["grid", "waves"] },
    { label: "Weathering", kinds: ["scratches", "splotches", "cracks"] },
    { label: "Pro Finish", kinds: ["machining", "paint", "knurl", "peel", "anodize"] }
  ];
  // Each entry may optionally declare a `custom` array of extra controls on
  // top of the shared slider set: { key, label, type: "range"|"select", ... }.
  // Rows for these are built once at mount (see mountTextureTool) and the
  // values live in state.custom[kind][key], so they never collide across
  // patterns. The 8 generic patterns declare none and are unaffected.
  const PATTERN_META = {
    noise:     { name: "Noise",     params: { scale: true,  octaves: true,  count: false } },
    cellular:  { name: "Cellular",  params: { scale: false, octaves: false, count: true  } },
    wood:      { name: "Wood Grain",params: { scale: true,  octaves: false, count: false } },
    grid:      { name: "Grid",      params: { scale: true,  octaves: false, count: true  } },
    waves:     { name: "Waves",     params: { scale: true,  octaves: false, count: false } },
    scratches: { name: "Scratches", params: { scale: true,  octaves: false, count: true  } },
    splotches: { name: "Splotches", params: { scale: true,  octaves: false, count: true  } },
    cracks:    { name: "Cracks",    params: { scale: false, octaves: false, count: true  } },
    machining: {
      name: "Machining Marks",
      params: { scale: false, octaves: false, count: false },
      custom: [
        { key: "direction", label: "Direction", type: "select",
          options: [{ value: "linear", label: "Linear" }, { value: "radial", label: "Radial" }],
          default: "linear" },
        { key: "pitch", label: "Pitch", type: "range", min: 2, max: 40, step: 1, default: 10 },
        { key: "waviness", label: "Waviness", type: "range", min: 0, max: 1, step: 0.05, default: 0.15 }
      ]
    },
    paint: {
      name: "Paint Strokes",
      params: { scale: false, octaves: false, count: true },
      custom: [
        { key: "strokeLength", label: "Stroke Length", type: "range", min: 20, max: 200, step: 5, default: 80 },
        { key: "turbulence", label: "Turbulence", type: "range", min: 0, max: 1, step: 0.05, default: 0.5 }
      ]
    },
    knurl: {
      name: "Knurling",
      params: { scale: false, octaves: false, count: false },
      custom: [
        { key: "angle", label: "Angle", type: "range", min: 0, max: 90, step: 1, default: 30 },
        { key: "pitch", label: "Pitch", type: "range", min: 2, max: 40, step: 1, default: 10 },
        { key: "mode", label: "Mode", type: "select",
          options: [{ value: "cross", label: "Cross" }, { value: "straight", label: "Straight" }],
          default: "cross" }
      ]
    },
    peel: {
      name: "Orange Peel",
      params: { scale: false, octaves: false, count: true },
      custom: [
        { key: "blend", label: "Blend", type: "range", min: 0, max: 0.6, step: 0.05, default: 0.25 }
      ]
    },
    anodize: {
      name: "Anodize Swirl",
      params: { scale: false, octaves: false, count: true },
      custom: [
        { key: "strokeLength", label: "Stroke Length", type: "range", min: 20, max: 200, step: 5, default: 80 },
        { key: "turbulence", label: "Turbulence", type: "range", min: 0, max: 1, step: 0.05, default: 0.5 }
      ]
    }
  };

  // --- Preset library (backlog #3) --------------------------------------
  // Built-in presets are hardcoded state snapshots (never touch storage),
  // merged into the dropdown alongside any user-saved presets. Each is built
  // from a shared "look" baseline plus overrides, with a full custom-param
  // object seeded from PATTERN_META defaults for every pattern kind (so a
  // preset stays well-formed even if the active pattern later changes).
  function defaultCustomState() {
    const custom = {};
    Object.keys(PATTERN_META).forEach(kind => {
      (PATTERN_META[kind].custom || []).forEach(def => {
        (custom[kind] = custom[kind] || {})[def.key] = def.default;
      });
    });
    return custom;
  }
  function builtinPresetState(overrides, customOverrides) {
    const s = Object.assign({
      pattern: "noise", scale: 60, octaves: 4, count: 24, roughness: 0.5,
      contrast: 1.2, levelsBlack: 0, levelsWhite: 1, levelsGamma: 1,
      bumpStrength: 1, lightAngle: 135, invert: false
    }, overrides);
    s.custom = defaultCustomState();
    if (customOverrides) {
      Object.keys(customOverrides).forEach(kind => {
        s.custom[kind] = Object.assign({}, s.custom[kind], customOverrides[kind]);
      });
    }
    return s;
  }
  // 5 built-ins spanning all 4 pattern groups (Organic/Geometric/Weathering/
  // Pro Finish), including two Pro Finish looks per the backlog's example.
  const BUILTIN_PRESETS = {
    "Steel — Brushed": builtinPresetState(
      { pattern: "machining", roughness: 0.3, contrast: 1.4, levelsBlack: 0.05,
        levelsWhite: 0.95, bumpStrength: 1.2, lightAngle: 135 },
      { machining: { direction: "linear", pitch: 6, waviness: 0.1 } }
    ),
    "Weathered Paint": builtinPresetState(
      { pattern: "paint", count: 40, roughness: 0.6, contrast: 1.1, levelsBlack: 0.1,
        levelsWhite: 0.9, levelsGamma: 1.3, bumpStrength: 0.8, lightAngle: 200 },
      { paint: { strokeLength: 140, turbulence: 0.8 } }
    ),
    "Rubber — Pebbled": builtinPresetState(
      { pattern: "splotches", scale: 40, count: 60, roughness: 0.5, contrast: 1.6,
        levelsBlack: 0.15, levelsWhite: 0.85, levelsGamma: 0.9, bumpStrength: 1.5,
        lightAngle: 120, invert: true }
    ),
    "Wood — Oak": builtinPresetState(
      { pattern: "wood", scale: 90, roughness: 0.4, contrast: 1.3, levelsBlack: 0.05,
        levelsWhite: 0.95, levelsGamma: 1.1, bumpStrength: 1.0, lightAngle: 150 }
    ),
    "Waves — Ripples": builtinPresetState(
      { pattern: "waves", scale: 50, roughness: 0.35, contrast: 1.2, bumpStrength: 1.1,
        lightAngle: 90 }
    )
  };

  function applyContrast(data, contrast) {
    for (let i = 0; i < data.length; i++) {
      data[i] = Math.min(1, Math.max(0, (data[i] - 0.5) * contrast + 0.5));
    }
  }

  // Photoshop-style levels: remap [black, white] to [0, 1] then apply a gamma
  // (midtone) curve. Runs after contrast, before invert.
  function applyLevels(data, black, white, gamma) {
    const range = Math.max(1e-4, white - black);
    const invGamma = 1 / Math.max(0.05, gamma);
    for (let i = 0; i < data.length; i++) {
      let v = (data[i] - black) / range;
      v = Math.min(1, Math.max(0, v));
      data[i] = Math.pow(v, invGamma);
    }
  }

  function paintHeightMap(canvas, data, w, h) {
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext("2d");
    const img = ctx.createImageData(w, h);
    for (let i = 0; i < data.length; i++) {
      const v = Math.round(data[i] * 255);
      img.data[i * 4] = v; img.data[i * 4 + 1] = v; img.data[i * 4 + 2] = v; img.data[i * 4 + 3] = 255;
    }
    ctx.putImageData(img, 0, 0);
  }

  function paintBumpPreview(canvas, data, w, h, bumpStrength, lightAngleDeg) {
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext("2d");
    const img = ctx.createImageData(w, h);
    const angle = (lightAngleDeg * Math.PI) / 180;
    const lx = Math.cos(angle), ly = Math.sin(angle);
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const xp = Math.min(w - 1, x + 1), xm = Math.max(0, x - 1);
        const yp = Math.min(h - 1, y + 1), ym = Math.max(0, y - 1);
        const dx = (data[y * w + xp] - data[y * w + xm]) * bumpStrength;
        const dy = (data[yp * w + x] - data[ym * w + x]) * bumpStrength;
        let shade = 0.55 - (dx * lx + dy * ly) * 1.5;
        shade = Math.min(1, Math.max(0, shade));
        const v = Math.round(shade * 255);
        const idx = (y * w + x) * 4;
        img.data[idx] = v; img.data[idx + 1] = v; img.data[idx + 2] = v; img.data[idx + 3] = 255;
      }
    }
    ctx.putImageData(img, 0, 0);
  }

  // Sobel-filter height-to-normal-map conversion (feature backlog #2). Operates
  // on the same grayscale `data` array computeTextureData produces, at export
  // size — pattern-agnostic (works for all pattern kinds unmodified). `at()`
  // wraps toroidally regardless of whether the source pattern actually tiles
  // (see docs/FEATURE_BACKLOG.md item #2): for non-tiling patterns this is a
  // harmless one-pixel-wide inaccuracy at the border, and avoids needing
  // separate edge-clamping logic. `strength` reuses state.bumpStrength so the
  // normal map's apparent intensity matches the bump preview already shown.
  function heightToNormalMap(data, w, h, strength) {
    const out = new Uint8ClampedArray(w * h * 4);
    const at = (x, y) => data[((y + h) % h) * w + ((x + w) % w)];
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const l = at(x - 1, y), r = at(x + 1, y), u = at(x, y - 1), d = at(x, y + 1);
        const dx = (l - r) * strength, dy = (u - d) * strength;
        const len = Math.sqrt(dx * dx + dy * dy + 1);
        const idx = (y * w + x) * 4;
        out[idx]     = Math.round((dx / len * 0.5 + 0.5) * 255); // R
        out[idx + 1] = Math.round((dy / len * 0.5 + 0.5) * 255); // G
        out[idx + 2] = Math.round((1 / len * 0.5 + 0.5) * 255);  // B
        out[idx + 3] = 255;
      }
    }
    return out;
  }

  function paintNormalMap(canvas, data, w, h, bumpStrength) {
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext("2d");
    const img = ctx.createImageData(w, h);
    img.data.set(heightToNormalMap(data, w, h, bumpStrength));
    ctx.putImageData(img, 0, 0);
  }

  function computeTextureData(size, state) {
    const gen = TEXTURE_GENERATORS[state.pattern] || generateNoise;
    const data = gen(size, size, state);
    applyContrast(data, state.contrast);
    applyLevels(data, state.levelsBlack, state.levelsWhite, state.levelsGamma);
    if (state.invert) { for (let i = 0; i < data.length; i++) data[i] = 1 - data[i]; }
    return data;
  }

  function mountTextureTool(main) {
    setCrumbs([{ label: "Texture & Bump Map Generator" }]);

    main.appendChild(buildPageHead(
      "Texture & Bump Map Generator",

    // Per-pattern custom params (Pro Finish patterns): eagerly seed every
    // declared custom param with its default. Because every export path
    // (static PNG + frame sequence) passes `state` straight into
    // computeTextureData, custom params flow into exports with no
    // export-code changes.
    Object.keys(PATTERN_META).forEach(kind => {

    // Ordered, labeled sections (Lens 4A reorg, later made uniformly

    function section(label, opts) {

    // --- 1. PRESET ---------------------------------------------------------

    // --- 3. SHAPE (+ PATTERN OPTIONS) --------------------------------------
    let sliderRowsWrap = section("Shape", { details: true });

    const sliderRefs = {};
    function row(key, label, min, max, step) {
      const rowEl = document.createElement("div");
      rowEl.className = "param-row";
      const lab = document.createElement("label");
      lab.textContent = label;
      const input = document.createElement("input");

      valSpan.className = "param-value";
      valSpan.textContent = state[key];
